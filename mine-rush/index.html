<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<style>
  :root {
    --cave:   #0e0a04;
    --deep:   #1a0f05;
    --mid:    #2a1a08;
    --rock:   #3d2b12;
    --amber:  #c97c1a;
    --gold:   #f9c74f;
    --orange: #f77f00;
    --iron:   #a0b4c8;
    --gem:    #9b5de5;
    --emerald:#43aa8b;
    --ruby:   #f94144;
    --white:  #f5ead8;
    --panel:  rgba(42,26,8,0.9);
    --border: rgba(201,124,26,0.25);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--cave);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(201,124,26,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(155,93,229,0.06) 0%, transparent 50%),
      linear-gradient(180deg, #0e0a04 0%, #1a0f05 40%, #2a1a08 100%);
    z-index:0; pointer-events:none;
  }

  /* Dust particles */
  .dust { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
  .dust-particle {
    position:absolute; border-radius:50%;
    background: rgba(201,124,26,0.4);
    animation: dust-rise linear infinite;
    bottom: -10px;
  }
  @keyframes dust-rise { to { transform: translateY(-110vh) translateX(var(--drift)); opacity:0; } }

  header {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:center;
    padding: 8px 20px;
    background: linear-gradient(90deg, var(--deep), var(--mid), var(--deep));
    border-bottom: 2px solid var(--border);
    gap: 12px;
  }
  header.embed .pick-emoji,
  header.embed h1 { display: none; }
  body.embed-mode header { display: none; }
  body.embed-mode .share-btn-fixed { display: none; }
  .header-right {
    position:absolute; right:16px; top:50%; transform:translateY(-50%);
    display:flex; align-items:center; gap:10px;
  }
  .share-btn-fixed {
    position: fixed; top: 12px; left: 16px; z-index: 100;
    background: transparent;
    border: 1px solid rgba(201,124,26,0.4);
    color: var(--gold); font-family:'Fredoka One',cursive; font-size:0.82rem;
    letter-spacing:1px; padding:5px 14px; cursor:pointer; border-radius:20px;
    transition:all 0.2s;
  }
  .share-btn-fixed:hover {
    background: rgba(201,124,26,0.15);
    border-color: rgba(201,124,26,0.7);
    color:#fff;
    box-shadow: 0 2px 14px rgba(201,124,26,0.3);
  }
  .reset-btn {
    background:transparent; border:none;
    color:var(--ruby); font-family:'Fredoka One',cursive; font-size:0.85rem;
    letter-spacing:1px; padding:4px 8px; cursor:pointer;
    transition:color 0.2s, text-shadow 0.2s;
    text-shadow: 0 0 8px rgba(249,65,68,0.4);
  }
  .reset-btn:hover { color:#ff6b6e; text-shadow:0 0 14px rgba(249,65,68,0.8); }

  /* SHARE MODAL */
  .share-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.8);
    z-index:10000; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(8px);
    animation: fade-in 0.2s ease;
  }
  @keyframes fade-in { from{opacity:0} to{opacity:1} }
  .share-modal {
    background: linear-gradient(135deg, #0e0a04, #2a1a08);
    border: 2px solid rgba(201,124,26,0.4);
    border-radius: 20px; padding: 24px 28px;
    width: min(860px, 94vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    animation: modal-pop 0.3s cubic-bezier(0.22,1,0.36,1);
    position: relative;
  }
  @keyframes modal-pop { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
  .share-modal-title {
    font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--gold);
    text-align:center; margin-bottom:18px; text-shadow:0 0 20px rgba(249,199,79,0.5);
  }
  .share-body {
    display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-bottom:16px;
  }
  .share-card {
    background: linear-gradient(135deg, #1a0f05, #3d2b12);
    border: 1px solid rgba(201,124,26,0.3);
    border-radius: 14px; padding: 16px 18px;
    font-family:'Fredoka One',cursive;
    display:flex; flex-direction:column; gap:12px;
  }
  .share-card-header {
    display:flex; align-items:center; gap:8px;
    font-size:1.1rem; color:var(--gold);
  }
  .share-stat-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:8px; flex:1;
  }
  .share-stat {
    background:rgba(0,0,0,0.3); border-radius:10px; padding:9px 10px;
    text-align:center;
  }
  .share-stat-val { font-size:1rem; color:var(--gold); }
  .share-stat-lbl { font-size:0.65rem; color:rgba(249,199,79,0.6); margin-top:2px; font-family:'Nunito',sans-serif; }
  .share-right {
    display:flex; flex-direction:column; gap:10px;
  }
  .share-right-title {
    font-family:'Fredoka One',cursive; font-size:0.85rem; color:var(--gold);
    letter-spacing:1px;
  }
  .share-text-area {
    flex:1; width:100%; background:rgba(0,0,0,0.4); border:1px solid rgba(201,124,26,0.3);
    border-radius:10px; color:var(--gold); font-family:'Nunito',sans-serif;
    font-size:0.78rem; line-height:1.7; padding:10px 12px; resize:none;
    outline:none; min-height:160px;
  }
  .share-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .share-copy-btn {
    flex:1; min-width:120px; background:linear-gradient(135deg,#43aa8b,#2d7a63);
    border:none; color:#fff; font-family:'Fredoka One',cursive; font-size:0.88rem;
    padding:10px 14px; border-radius:12px; cursor:pointer; transition:all 0.15s;
  }
  .share-copy-btn:hover { transform:scale(1.03); box-shadow:0 4px 16px rgba(67,170,139,0.5); }
  .share-screenshot-btn {
    flex:1; min-width:140px;
    background:linear-gradient(135deg,#8b5e2a,#6b3e10);
    border:1px solid rgba(249,199,79,0.3);
    color:#fff; font-family:'Fredoka One',cursive; font-size:0.88rem;
    padding:10px 14px; border-radius:12px; cursor:pointer; transition:all 0.15s;
  }
  .share-screenshot-btn:hover { transform:scale(1.03); box-shadow:0 4px 16px rgba(201,124,26,0.5); }
  .share-close-btn {
    background:rgba(249,65,68,0.15); border:1px solid rgba(249,65,68,0.3);
    color:var(--ruby); font-family:'Fredoka One',cursive; font-size:0.88rem;
    padding:10px 16px; border-radius:12px; cursor:pointer; transition:all 0.15s;
  }
  .share-close-btn:hover { background:rgba(249,65,68,0.3); }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(249,199,79,0.5);
    letter-spacing: 2px;
  }
  .pick-emoji { font-size: 2rem; animation: dig 1.5s ease-in-out infinite; display:inline-block; }
  @keyframes dig { 0%,100%{transform:rotate(-20deg) translateY(0)} 50%{transform:rotate(20deg) translateY(4px)} }

  .game {
    position:relative; z-index:5;
    display:grid;
    grid-template-columns: 280px 1fr 300px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* LEFT PANEL */
  .panel-left {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; backdrop-filter: blur(10px);
  }
  .panel-title {
    font-family:'Fredoka One',cursive; font-size:1rem; color: var(--gold);
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2); display:flex; align-items:center; gap:6px;
  }

  /* CENTER */
  .panel-center {
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    gap: 14px; padding: 14px 20px;
    position: relative; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--amber) transparent;
  }
  .ore-counter { text-align: center; }
  .ore-count {
    font-family: 'Fredoka One', cursive; font-size: 2.8rem;
    color: var(--gold); text-shadow: 0 0 30px rgba(249,199,79,0.5); line-height: 1;
  }
  .ore-count-label { font-size: 0.85rem; color: var(--gold); opacity: 0.7; margin-top: 4px; }
  .ore-per-sec { font-size: 0.9rem; color: var(--amber); margin-top: 2px; }

  .mine-btn-wrap {
    position: relative; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    width: 100%; height: 220px;
  }
  .mine-btn {
    width: 170px; height: 170px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #6b4a1a 0%, #3d2b12 40%, #2a1a08 70%, #1a0f05 100%);
    border: 4px solid rgba(201,124,26,0.5);
    box-shadow: 0 0 40px rgba(201,124,26,0.4), 0 0 80px rgba(201,124,26,0.1), inset 0 2px 8px rgba(255,255,255,0.1);
    cursor: pointer; transition: transform 0.08s, box-shadow 0.08s;
    font-size: 4.5rem; display: flex; align-items:center; justify-content:center;
    user-select: none; -webkit-user-select: none; position: relative; overflow: hidden;
    z-index: 4;
  }
  .mine-btn::after {
    content:''; position:absolute; inset:0; border-radius:50%;
    background: radial-gradient(circle at 38% 30%, rgba(255,255,255,0.15), transparent 60%);
    pointer-events:none;
  }
  .mine-btn:hover { transform: scale(1.04); box-shadow: 0 0 60px rgba(201,124,26,0.6), 0 0 100px rgba(201,124,26,0.2), inset 0 2px 8px rgba(255,255,255,0.15); }
  .mine-btn:active { transform: scale(0.94); }
  .glow-ring {
    position:absolute; width:190px; height:190px; border-radius:50%;
    border: 2px solid rgba(201,124,26,0.2); animation: pulse-ring 2s ease-in-out infinite; pointer-events:none;
    z-index: 2;
  }
  .glow-ring2 { width:220px; height:220px; animation-delay:0.5s; border-color:rgba(201,124,26,0.1); }
  @keyframes pulse-ring { 0%,100%{transform:scale(1);opacity:0.6} 50%{transform:scale(1.05);opacity:1} }

  .click-zone {
    position: absolute; inset: 0;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    z-index: 3;
  }

  /* Mine shaft animation canvas */
  .mine-anim {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
    border-radius: 16px;
  }
  #mine-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    border-radius: 16px;
  }

  /* BUILDING SCENE */
  .building-scene {
    width: 100%; background: rgba(0,0,0,0.3);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 0; display:flex; flex-direction:column; gap:0;
    flex: 1; min-height: 0; overflow: hidden;
  }
  .scene-title {
    font-family:'Fredoka One',cursive; font-size:1rem;
    color: var(--gold); text-align:center; letter-spacing:1px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2); flex-shrink:0;
  }
  .scene-row {
    display:flex; align-items:center; gap:0;
    height: var(--row-h); flex-shrink:0;
    border-bottom: 1px solid rgba(201,124,26,0.07);
    overflow: hidden;
  }
  .scene-row-label {
    font-size:0.6rem; color:rgba(249,199,79,0.35);
    width: 80px; flex-shrink:0; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; padding-left:2px;
  }
  .scene-row-icons {
    flex:1; display:flex; align-items:center;
    overflow:hidden; gap:1px;
  }
  .scene-unit {
    display:inline-block; flex-shrink:0; line-height:1;
    animation: bob 1.5s ease-in-out infinite;
    animation-delay: var(--delay);
  }
  .scene-overflow {
    font-family:'Fredoka One',cursive; font-size:0.7rem;
    color:var(--gold); flex-shrink:0; margin-left:2px;
  }
  .scene-row-count {
    font-family:'Fredoka One',cursive; font-size:0.75rem;
    color:var(--amber); flex-shrink:0; width:28px; text-align:right;
    padding-right:4px;
  }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  .scene-empty { font-size:0.7rem; color:rgba(249,199,79,0.2); text-align:center; padding:12px 0; }

  .click-info { font-size:0.8rem; color:rgba(249,199,79,0.4); text-align:center; }

  /* PARTICLES */
  .particle {
    position:fixed; pointer-events:none; font-size:1.4rem;
    font-family:'Fredoka One',cursive; color: var(--gold);
    text-shadow: 0 0 10px rgba(249,199,79,0.8);
    animation: float-up 0.9s ease-out forwards; z-index:999;
  }
  @keyframes float-up { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-80px) scale(0.5);opacity:0} }

  .milestone {
    position:fixed; top:70px; left:50%; transform:translateX(-50%);
    background: linear-gradient(135deg, var(--gold), var(--orange));
    color: var(--deep); font-family:'Fredoka One',cursive; font-size:1.1rem;
    padding: 8px 24px; border-radius: 30px;
    box-shadow: 0 4px 20px rgba(249,199,79,0.5); z-index:999;
    animation: banner-in 0.4s ease, banner-out 0.4s ease 2.5s forwards;
  }
  @keyframes banner-in{ from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes banner-out{ to{opacity:0;transform:translateX(-50%) translateY(-20px)} }

  /* RIGHT PANEL */
  .panel-right {
    background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px);
  }
  .scroll-list {
    flex:1; overflow-y: auto; padding: 8px;
    scrollbar-width: thin; scrollbar-color: var(--amber) transparent;
  }
  .scroll-list::-webkit-scrollbar { width:4px; }
  .scroll-list::-webkit-scrollbar-thumb { background:var(--amber); border-radius:2px; }

  /* BUILDING CARD */
  @keyframes unlock-slide {
    from { opacity:0; transform: translateX(30px) scale(0.95); }
    to   { opacity:1; transform: translateX(0)    scale(1); }
  }
  .building-card {
    display:flex; align-items:center; gap:10px;
    padding: 8px 10px; margin-bottom: 5px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s; position:relative; overflow:hidden;
  }
  .building-card.unlocked-new {
    animation: unlock-slide 0.4s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  .building-card::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(201,124,26,0.07), transparent);
    transform:translateX(-100%); transition:transform 0.3s;
  }
  .building-card:hover::before { transform:translateX(100%); }
  .building-card:hover { background: rgba(201,124,26,0.1); border-color: rgba(201,124,26,0.4); transform:translateX(2px); }
  .building-card.affordable { border-color: rgba(67,170,139,0.5); background: rgba(67,170,139,0.06); }
  .building-card.affordable:hover { background: rgba(67,170,139,0.14); border-color: var(--emerald); }
  .building-card.cant-afford { opacity:0.5; }
  .building-icon { font-size:1.7rem; flex-shrink:0; }
  .building-info { flex:1; min-width:0; }
  .building-name { font-weight:800; font-size:0.82rem; color: var(--gold); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .building-desc { font-size:0.68rem; color: rgba(249,199,79,0.6); line-height:1.3; }
  .building-fps { font-size:0.65rem; color:rgba(249,199,79,0.5); }
  .building-right { text-align:right; flex-shrink:0; }
  .building-cost { font-family:'Fredoka One',cursive; font-size:0.85rem; color: var(--gold); }
  .building-count { font-family:'Fredoka One',cursive; font-size:1.1rem; color: var(--amber); }

  /* UPGRADE CARD */
  .upgrade-card {
    display:flex; align-items:center; gap:10px; padding:7px 10px; margin-bottom:4px;
    border-radius:8px; cursor:pointer; transition:all 0.15s; position:relative;
  }
  .upgrade-card.available {
    background:rgba(249,199,79,0.07); border:1px solid rgba(249,199,79,0.3);
  }
  .upgrade-card.available:hover {
    background:rgba(249,199,79,0.18); border-color:rgba(249,199,79,0.7);
    transform:translateX(2px);
  }
  .upgrade-card.cant-afford-upg {
    background:rgba(249,199,79,0.03); border:1px solid rgba(249,199,79,0.1);
    opacity:0.55; cursor:not-allowed;
  }
  .upgrade-card.purchased {
    background:rgba(67,170,139,0.08); border:1px solid rgba(67,170,139,0.25);
    cursor:default; opacity:0.55;
  }
  .upgrade-icon { font-size:1.4rem; flex-shrink:0; }
  .upgrade-info { flex:1; }
  .upgrade-name { font-weight:800; font-size:0.8rem; color:var(--gold); }
  .upgrade-desc { font-size:0.67rem; color:rgba(249,199,79,0.6); }
  .upgrade-cost-lbl { font-family:'Fredoka One',cursive; font-size:0.78rem; color:var(--gold); text-align:right; flex-shrink:0; }

  .stats-bar {
    padding:6px 14px; border-top:1px solid var(--border); background:rgba(0,0,0,0.3);
    display:grid; grid-template-columns:1fr 1fr; gap:4px 16px; font-size:0.72rem; color:rgba(249,199,79,0.6);
  }
  .stat-item strong { color:var(--gold); }

  .tooltip {
    position:fixed; z-index:9999; background:rgba(14,10,4,0.97);
    border:1px solid var(--border); border-radius:10px; padding:10px 14px;
    font-size:0.78rem; max-width:220px; pointer-events:none;
    backdrop-filter:blur(10px); box-shadow:0 8px 24px rgba(0,0,0,0.5); display:none;
  }
  .tooltip-title { font-family:'Fredoka One',cursive; color:var(--gold); margin-bottom:4px; }
  .tooltip-body { color:rgba(249,199,79,0.7); line-height:1.5; }
  .tooltip-bonus { color:var(--emerald); font-size:0.75rem; margin-top:4px; }

  /* BONUS ORE */
  .bonus-ore {
    position: fixed;
    cursor: pointer;
    z-index: 200;
    pointer-events: all;
    user-select: none;
    animation: bonus-float var(--float-dur) linear forwards;
    transition: transform 0.12s;
    transform-origin: center;
  }
  .bonus-ore:hover { transform: scale(1.35) rotate(10deg) !important; }
  .bonus-ore:active { transform: scale(0.85) !important; }
  .bonus-ore.type-common  { font-size: 2rem;   animation: bonus-float-wobble var(--float-dur) ease-in-out forwards; }
  .bonus-ore.type-rare    { font-size: 2.4rem; animation: bonus-float-spiral var(--float-dur) linear forwards; }
  .bonus-ore.type-epic    { font-size: 2.8rem; animation: bonus-float-bounce var(--float-dur) ease-in-out forwards; }
  .bonus-ore.type-legendary { font-size: 3.4rem; animation: bonus-float-flash var(--float-dur) linear forwards; }

  @keyframes bonus-float-wobble {
    0%   { opacity:0; transform: scale(0.4) rotate(-10deg); }
    8%   { opacity:1; transform: scale(1) rotate(5deg); }
    30%  { transform: scale(1.05) rotate(-5deg) translateY(-8px); }
    60%  { transform: scale(1) rotate(5deg) translateY(5px); }
    90%  { opacity:1; }
    100% { opacity:0; transform: scale(0.6) translateY(var(--drift-y)) translateX(var(--drift-x)); }
  }
  @keyframes bonus-float-spiral {
    0%   { opacity:0; transform: scale(0.3) rotate(0deg); }
    8%   { opacity:1; transform: scale(1) rotate(180deg); }
    50%  { transform: scale(1.1) rotate(360deg) translateY(var(--mid-y,0px)); }
    90%  { opacity:1; }
    100% { opacity:0; transform: scale(0.5) rotate(720deg) translateY(var(--drift-y)) translateX(var(--drift-x)); }
  }
  @keyframes bonus-float-bounce {
    0%   { opacity:0; transform: scale(0.2); }
    5%   { opacity:1; transform: scale(1.3); }
    15%  { transform: scale(0.9); }
    25%  { transform: scale(1.15) translateY(-15px); }
    40%  { transform: scale(1) translateY(0); }
    60%  { transform: scale(1.1) translateY(-10px); }
    80%  { transform: scale(1) translateY(0); }
    90%  { opacity:1; }
    100% { opacity:0; transform: scale(0.7) translateY(var(--drift-y)) translateX(var(--drift-x)); }
  }
  @keyframes bonus-float-flash {
    0%   { opacity:0; transform: scale(0) rotate(0deg); }
    6%   { opacity:1; transform: scale(1.4) rotate(-15deg); }
    12%  { transform: scale(1) rotate(10deg); }
    25%  { transform: scale(1.2) rotate(-5deg); filter: brightness(1.5); }
    50%  { transform: scale(1) rotate(5deg); filter: brightness(1); }
    75%  { transform: scale(1.15) rotate(-8deg); filter: brightness(2); }
    90%  { opacity:1; }
    100% { opacity:0; transform: scale(0.6) translateY(var(--drift-y)) translateX(var(--drift-x)); }
  }

  .bonus-ore-label {
    position: absolute;
    bottom: -18px; left: 50%; transform: translateX(-50%);

    pointer-events: none;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .bonus-ore-wrap {
    position: fixed; z-index: 200; pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
  }

  .crisis-vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 490;

    position: fixed;
    bottom: 70px; left: 50%; transform: translateX(-50%);

    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    z-index: 500; width: 370px;
    animation: crisis-in 0.45s cubic-bezier(0.22,1,0.36,1);
    overflow: hidden;
  }
  @keyframes crisis-in {
    from { opacity:0; transform: translateX(-50%) translateY(60px) scale(0.88); }
    to   { opacity:1; transform: translateX(-50%) translateY(0)    scale(1);    }
  }
  @keyframes crisis-out {
    to   { opacity:0; transform: translateX(-50%) translateY(60px) scale(0.88); }
  }
  .crisis-banner.resolving { animation: crisis-out 0.35s ease forwards; }
  .crisis-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px 10px;
    background: rgba(0,0,0,0.35);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .crisis-icon-wrap {
    font-size: 2.2rem; flex-shrink: 0;

  }

  @keyframes spin-crisis { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes bob-crisis { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-6px); } }
  @keyframes flash-crisis { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.4; transform:scale(1.3); } }
  .crisis-titles { flex: 1; }
  .crisis-title  { font-size: 1rem; line-height: 1.2; }
  .crisis-building-tag { font-size: 0.68rem; opacity: 0.7; margin-top: 2px; font-family: 'Nunito', sans-serif; font-weight: 700; }
  .crisis-body { padding: 10px 16px 14px; }
  .crisis-desc { font-size: 0.76rem; font-family:'Nunito',sans-serif; opacity: 0.85; margin-bottom: 10px; line-height: 1.5; }
  .crisis-action-hint {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.3); border-radius: 10px;
    padding: 7px 12px; margin-bottom: 10px;
    font-size: 0.78rem; font-family:'Nunito',sans-serif;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .crisis-action-icon { font-size: 1.3rem; flex-shrink:0; }
  .crisis-action-text { flex:1; line-height:1.4; }
  .crisis-bar-wrap { background: rgba(0,0,0,0.4); border-radius: 8px; height: 12px; overflow: hidden; }
  .crisis-bar {
    height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, #f9c74f, #f77f00);
    transition: width 0.12s ease-out;
    position: relative;
  }
  .crisis-bar::after { content:''; position:absolute; right:0; top:0; bottom:0; width:6px; background: rgba(255,255,255,0.5); border-radius:0 8px 8px 0; }
  .crisis-progress-row { display:flex; justify-content:space-between; align-items:center; margin-top:5px; }
  .crisis-clicks { font-size: 0.7rem; opacity: 0.65; }
  .crisis-pct    { font-size: 0.7rem; color: #f9c74f; }
  .scene-row.crisis-building { animation: row-crisis 0.6s ease-in-out infinite; border-radius: 6px; }
  @keyframes row-crisis { 0%,100%{ background: transparent; } 50%{ background: rgba(249,65,68,0.18); box-shadow: inset 0 0 8px rgba(249,65,68,0.3); } }
  body.in-crisis .mine-btn {
    border-color: rgba(249,65,68,0.7) !important;
    box-shadow: 0 0 50px rgba(249,65,68,0.5), inset 0 2px 8px rgba(255,255,255,0.15) !important;
  }

  #banner-ad {
    flex-shrink: 0;

function getCurrentStage() {
  let stage = MINE_STAGES[0];
  for(const s of MINE_STAGES) { if(state.totalOre >= s.min) stage = s; }
  return stage;
}

let lastStageIdx = 0;

  const stage = getCurrentStage();

const activeBoosts = { frenzy: null, harvest: null };

function applyBoost(type, mult, durationMs, emoji, label) {
  // Cancel existing boost of same type cleanly
  if(activeBoosts[type]) {
    clearTimeout(activeBoosts[type].timerId);
    if(activeBoosts[type].barEl) activeBoosts[type].barEl.remove();
    if(type === 'frenzy')  state.clickMultiplier  = Math.max(1, state.clickMultiplier / activeBoosts[type].mult);
    if(type === 'harvest') state.boostHarvestMult = Math.max(1, (state.boostHarvestMult||1) / activeBoosts[type].mult);
  }

  if(type === 'frenzy')  state.clickMultiplier  *= mult;
  if(type === 'harvest') state.boostHarvestMult  = (state.boostHarvestMult||1) * mult;
  recalcFPS();

  const bar = createBoostBar(type, emoji||'⚡', label||type, mult, durationMs);

  const timerId = setTimeout(() => {
    if(type === 'frenzy')  state.clickMultiplier  = Math.max(1, state.clickMultiplier / mult);
    if(type === 'harvest') state.boostHarvestMult = Math.max(1, (state.boostHarvestMult||1) / mult);
    recalcFPS();
    if(activeBoosts[type]) { activeBoosts[type].barEl?.remove(); activeBoosts[type] = null; }
    showMilestone(`${emoji||'⚡'} ${label||type} boost ended`);
  }, durationMs);

  activeBoosts[type] = { mult, timerId, barEl: bar };
}

function createBoostBar(type, emoji, label, mult, durationMs) {
  let container = document.getElementById('boost-bars');
  if(!container) {
    container = document.createElement('div');
    container.id = 'boost-bars';
    container.style.cssText = `position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
      display:flex;flex-direction:column;align-items:center;gap:6px;z-index:600;pointer-events:none;`;
    document.body.appendChild(container);
  }
  const isClick   = type === 'frenzy';
  const accentCol = isClick ? '#f9c74f' : '#43aa8b';
  const bgCol     = isClick ? 'rgba(50,30,0,0.9)' : 'rgba(10,40,20,0.9)';
  const bar = document.createElement('div');
  bar.style.cssText = `background:${bgCol};border:1px solid ${accentCol}55;border-radius:30px;
    padding:5px 14px 5px 10px;display:flex;align-items:center;gap:8px;min-width:200px;
    box-shadow:0 2px 14px ${accentCol}33;`;
  bar.innerHTML = `
    <span style="font-size:1.2rem">${emoji}</span>
    <div style="flex:1">
      <div style="font-family:'Fredoka One',cursive;font-size:0.78rem;color:${accentCol};white-space:nowrap">
        ${label} <span style="opacity:0.7;font-size:0.7rem">×${mult} ${isClick?'click':'production'}</span>
      </div>
      <div style="background:rgba(0,0,0,0.4);border-radius:4px;height:5px;margin-top:3px;overflow:hidden">
        <div class="boost-progress" style="height:100%;border-radius:4px;background:${accentCol};width:100%;transition:width 0.25s linear"></div>
      </div>
    </div>`;
  container.appendChild(bar);
  const prog = bar.querySelector('.boost-progress');
  const start = Date.now();
  const ticker = setInterval(() => {
    const pct = Math.max(0, 100 - ((Date.now()-start)/durationMs)*100);
    prog.style.width = pct+'%';
    if(pct<=0) clearInterval(ticker);
  }, 100);
  return bar;
}

// ── SESSION TIMER ─────────────────────────────────────────────
let sessionStart = Date.now();

function fmtDuration(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if(d > 0)  return `${d}d ${h%24}h ${m%60}m`;
  if(h > 0)  return `${h}h ${m%60}m`;
  if(m > 0)  return `${m}m ${s%60}s`;
  return `${s}s`;
}

function fmtDate(ts) {
  if(!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString(undefined, { day:'2-digit', month:'short', year:'numeric' });
}

// ── HELPERS ──────────────────────────────────────────────────
function fmt(n) {
  if(n>=1e12) return (n/1e12).toFixed(2)+'T';
  if(n>=1e9)  return (n/1e9).toFixed(2)+'B';
  if(n>=1e6)  return (n/1e6).toFixed(2)+'M';
  if(n>=1e3)  return Math.floor(n).toLocaleString('de-DE');
  return Math.floor(n).toString();
}

function fmtShort(n) {
  if(n>=1e12) return (n/1e12).toFixed(2)+'t';
  if(n>=1e9)  return (n/1e9).toFixed(2)+'b';
  if(n>=1e6)  return (n/1e6).toFixed(2)+'m';
  if(n>=1e3)  return (n/1e3).toFixed(2)+'k';
  return Math.floor(n).toString();
}

function fmtRate(n) {
  if(n===0)    return '0';
  if(n>=1e6)   return (n/1e6).toFixed(2)+'M';
  if(n>=1e3)   return (n/1e3).toFixed(2)+'K';
  if(n>=100)   return n.toFixed(1);
  if(n>=1)     return n.toFixed(2);
  return n.toFixed(2);
}

function getCost(b) {
  const cnt = state.buildings[b.id] || 0;
  return Math.ceil(b.baseCost * Math.pow(1.28, cnt));
}

function getTotalFps(b) {
  const cnt = state.buildings[b.id] || 0;
  return (state.bldBoost?.[b.id] || 1) * (state.globalMult || 1) * b.baseFps * cnt;
}

function recalcFPS() {
  let fps = 0;
  for(const b of BUILDINGS) fps += getTotalFps(b);
  const crisisPenalty  = state.crisisActive ? state.crisisActive.fpsPenalty : 1;
  const harvestMult    = state.boostHarvestMult || 1;
  state.orePerSec  = fps * crisisPenalty * harvestMult;
  state.orePerClick = Math.max(1, (state.baseClickPower + Math.floor(fps * state.clickSynergyRate)) * state.clickMultiplier);
  document.getElementById('click-power').textContent = fmtRate(state.orePerClick);
  document.getElementById('ore-ps').textContent = fmtRate(state.orePerSec)+' ore/sec';
}

function boostBuilding(id, mult) {
  if(!state.bldBoost) state.bldBoost = {};
  state.bldBoost[id] = (state.bldBoost[id] || 1) * mult;
  recalcFPS();
}

function globalBoost(mult) {
  state.globalMult = (state.globalMult || 1) * mult;
  recalcFPS();
}

// ── SAVE / LOAD ──────────────────────────────────────────────
const SAVE_KEY = 'mineRushSave';
const _XK = [0x4d,0x49,0x4e,0x45,0x52,0x55,0x53,0x48];

function _encode(obj) {
  const str = JSON.stringify(obj);
  let out = '';
  for(let i=0;i<str.length;i++) out += String.fromCharCode(str.charCodeAt(i) ^ _XK[i%_XK.length]);
  return btoa(out);
}
function _decode(enc) {
  const str = atob(enc);
  let out = '';
  for(let i=0;i<str.length;i++) out += String.fromCharCode(str.charCodeAt(i) ^ _XK[i%_XK.length]);
  return JSON.parse(out);
}
function _checksum(data) {
  const s = Math.floor(data.ore) + Math.floor(data.totalOre) +
    Object.values(data.buildings||{}).reduce((a,b)=>a+b,0);
  return (s*31+7) % 999983;
}

function saveGame() {
  const now = Date.now();
  state.totalPlayTime += now - sessionStart;
  sessionStart = now;
  if(!state.firstPlayedAt) state.firstPlayedAt = now;
  const data = {
    ore: state.ore,
    totalOre: state.totalOre,
    buildings: state.buildings,
    purchasedUpgrades: [...state.purchasedUpgrades],
    totalClicks: state.totalClicks,
    oreFromClicks: state.oreFromClicks,
    totalCrisesResolved: state.totalCrisesResolved,
    catchedBonusOre: state.catchedBonusOre,
    lastMilestone: lastMilestone,
    firstPlayedAt: state.firstPlayedAt,
    totalPlayTime: state.totalPlayTime,
    savedAt: now,
  };
  data._c = _checksum(data);
  localStorage.setItem(SAVE_KEY, _encode(data));
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const data = _decode(raw);
    if(data._c !== _checksum(data)) {
      localStorage.removeItem(SAVE_KEY);
      showMilestone('Save data corrupted — starting fresh ⛏️');
      return;
    }
    state.ore                 = data.ore || 0;
    state.totalOre            = data.totalOre || 0;
    state.buildings           = data.buildings || {};
    state.purchasedUpgrades   = new Set(data.purchasedUpgrades || []);
    state.totalClicks         = data.totalClicks || 0;
    state.oreFromClicks       = data.oreFromClicks || 0;
    state.totalCrisesResolved = data.totalCrisesResolved || 0;
    state.catchedBonusOre     = data.catchedBonusOre || 0;
    state.firstPlayedAt       = data.firstPlayedAt || 0;
    state.totalPlayTime       = data.totalPlayTime || 0;
    lastMilestone             = data.lastMilestone || 0;

    // reset derived state before reapplying upgrades
    state.baseClickPower   = 1;
    state.clickMultiplier  = 1;
    state.clickSynergyRate = 0;
    state.boostHarvestMult = 1;
    state.bldBoost = {};
    state.globalMult = 1;
    for(const u of UPGRADES) {
      if(state.purchasedUpgrades.has(u.id)) u.effect();
    }
    recalcFPS();

    // Sync stage index to avoid false milestone on load
    lastStageIdx = MINE_STAGES.indexOf(getCurrentStage());

    // Offline progress
    if(data.savedAt && state.orePerSec > 0) {
      const elapsed = Math.min((Date.now() - data.savedAt) / 1000, 3600);
      if(elapsed > 10) {
        const gained = state.orePerSec * elapsed;
        state.ore += gained;
        state.totalOre += gained;
        setTimeout(() => showMilestone(`⏱️ Away ${Math.round(elapsed)}s — +${fmt(gained)} ore!`), 800);
      }
    }
  } catch(e) { localStorage.removeItem(SAVE_KEY); }
}

function resetGame() {
  if(!confirm('Reset all progress and start over? This cannot be undone.')) return;
  window.removeEventListener('beforeunload', saveGame);
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

const unlockedBuildings = new Set(BUILDINGS.filter(b=>b.req()).map(b=>b.id));

function renderBuildings() {
  const list = document.getElementById('buildings-list');
  list.innerHTML = '';
  for(const b of BUILDINGS) {
    if(!b.req() && !(state.buildings[b.id]||0)) continue;
    const isNew = !unlockedBuildings.has(b.id);
    if(isNew) unlockedBuildings.add(b.id);
    const cost = getCost(b);
    const cnt  = state.buildings[b.id]||0;
    const fps  = getTotalFps(b);
    const can  = state.ore >= cost;
    const div  = document.createElement('div');
    div.className = 'building-card' + (can?' affordable':' cant-afford') + (isNew?' unlocked-new':'');
    div.dataset.id = b.id;
    div.innerHTML = `
      <div class="building-icon">${b.icon}</div>
      <div class="building-info">
        <div class="building-name">${b.name}</div>
        <div class="building-desc">${b.desc}</div>
        <div class="building-fps">+${fmtRate(b.baseFps * (state.bldBoost?.[b.id]||1))} ore/sec each</div>

        <div class="building-count">${cnt}</div>
        <div class="building-cost">⛏️ ${fmt(cost)}</div>

    div.addEventListener('click', () => buyBuilding(b));
    div.addEventListener('mouseenter', e => {
      const bonus = cnt > 0 ? `Total: ${fmtRate(fps)} ore/sec` : '';
      showTooltip(e, b.name, b.desc, bonus);
    });
    div.addEventListener('mouseleave', hideTooltip);
    list.appendChild(div);
  }
}

// ── SCENE VISUALIZATION ──────────────────────────────────────
function renderScene() {
  const el = document.getElementById('scene-content');
  const ownedBuildings = BUILDINGS.filter(b => (state.buildings[b.id]||0) > 0);
  if(ownedBuildings.length === 0) {
    el.innerHTML = '<div class="scene-empty">Buy a building to see it here...</div>';
    return;
  }
  const ROW_H = Math.max(20, Math.min(36, Math.floor((el.clientHeight || 200) / ownedBuildings.length)));
  el.style.setProperty('--row-h', ROW_H+'px');
  const MAX_ICONS = Math.floor((el.clientWidth || 200) / (ROW_H * 0.9));
  let html = '';
  for(const b of ownedBuildings) {
    const cnt = state.buildings[b.id];
    const show = Math.min(cnt, MAX_ICONS);
    const overflow = cnt - show;
    const isCrisisBuilding = state.crisisActive && state.crisisActive.building === b.id;
    let icons = '';
    for(let i=0;i<show;i++) icons += `<span class="scene-unit" style="--delay:${(i*0.13).toFixed(2)}s;font-size:${ROW_H*0.72}px">${b.sceneIcon}</span>`;
    if(overflow>0) icons += `<span class="scene-overflow">+${overflow}</span>`;
    html += `<div class="scene-row${isCrisisBuilding?' crisis-building':''}" style="--row-h:${ROW_H}px">
      <div class="scene-row-label">${b.name}</div>
      <div class="scene-row-icons">${icons}</div>
      <div class="scene-row-count">${cnt}</div>
    </div>`;
  }
  el.innerHTML = html;
}

// ── BUY ──────────────────────────────────────────────────────
function buyBuilding(b) {
  const cost = getCost(b);
  if(state.ore < cost) return;
  state.ore -= cost;
  state.buildings[b.id] = (state.buildings[b.id]||0) + 1;
  recalcFPS();
  // check new unlocks (unlockedBuildings tracks in renderBuildings, but milestone here)
  for(const nb of BUILDINGS) {
    if(!unlockedBuildings.has(nb.id) && nb.req()) {
      showMilestone(`🔓 Unlocked: ${nb.name}!`);
    }
  }
  renderBuildings();
  renderScene();
}

function buyUpgrade(u) {
  if(state.ore < u.cost || state.purchasedUpgrades.has(u.id)) return;
  state.ore -= u.cost;
  state.purchasedUpgrades.add(u.id);
  u.effect();
  recalcFPS();
  renderUpgrades();
}

// ── CLICK BOT PROTECTION ─────────────────────────────────────
const clickGuard = {
  times: [], window: 2000, maxClicks: 30,
  penalised: false, penaltyUntil: 0, penaltyMs: 4000,
  lastX: null, lastY: null, sameSpotCount: 0, sameSpotLimit: 15,
  check(x, y) {
    const now = Date.now();
    if(this.penalised && now < this.penaltyUntil) return false;
    this.penalised = false;
    this.times = this.times.filter(t => now - t < this.window);
    this.times.push(now);
    if(this.times.length > this.maxClicks) { this._penalise('Too fast! Slow down ⛏️'); return false; }
    if(this.lastX === x && this.lastY === y) {
      if(++this.sameSpotCount >= this.sameSpotLimit) { this._penalise('Suspicious clicks! 🤖'); return false; }
    } else { this.sameSpotCount = 0; }
    this.lastX = x; this.lastY = y;
    return true;
  },
  _penalise(msg) {
    this.penalised = true; this.penaltyUntil = Date.now() + this.penaltyMs;
    this.times = []; this.sameSpotCount = 0;
    showWarning(msg);
  }
};

function showWarning(msg) {
  let el = document.getElementById('mine-warning');
  if(!el) {
    el = document.createElement('div'); el.id = 'mine-warning';
    el.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,#f94144,#c1121f);color:#fff;
      font-family:'Fredoka One',cursive;font-size:1rem;padding:8px 24px;
      border-radius:30px;z-index:9999;box-shadow:0 4px 20px rgba(249,65,68,0.5);
      animation:banner-in 0.3s ease;pointer-events:none;`;
    document.body.appendChild(el);
  }
  el.textContent = msg;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.remove(), 3000);
}

// ── MILESTONES ───────────────────────────────────────────────
let lastMilestone = 0;
const MILESTONES      = [100,1000,10000,100000,1000000,10000000,100000000];
const MILESTONE_MSGS  = ['100 Ore! ⛏️','1,000 Ore! 🪨','10,000! 🔩','100,000! 💛','One Million! 💎','Ten Million! 🔮','100 Million! 🌋'];

// ── HOLD CRISIS support ───────────────────────────────────────
let holdInterval = null;

// ── CLICK ────────────────────────────────────────────────────
function handleClick(e) {
  if(!clickGuard.check(e.clientX, e.clientY)) return;

  if(state.crisisActive && state.crisisActive.solveType !== 'hold') {
    const deduct = state.crisisActive.solveType === 'mash' ? 2 : 1;
    state.crisisClicksLeft = Math.max(0, state.crisisClicksLeft - deduct);
    updateCrisisBar();
    if(state.crisisClicksLeft <= 0) resolveCrisis();
  }

  const gain = state.orePerClick;
  state.ore           += gain;
  state.totalOre      += gain;
  state.oreFromClicks += gain;
  state.totalClicks++;

  for(let i=0;i<MILESTONES.length;i++) {
    if(state.totalOre >= MILESTONES[i] && lastMilestone < MILESTONES[i]) {
      lastMilestone = MILESTONES[i];
      showMilestone(MILESTONE_MSGS[i]);
    }
  }

  spawnParticle(e.clientX, e.clientY, '+'+fmt(gain));
  renderCounter();
  updateMineBtn();
}

// ── CANVAS ───────────────────────────────────────────────────
const sparkles = [];
function initCanvas() {
  const canvas = document.getElementById('mine-canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
  resize();
  new ResizeObserver(resize).observe(canvas);

  const ORES = ['🪨','⚪','💛','💎','🔩'];
  let rafRunning = false;
  function drawFrame() {
    if(document.hidden) { rafRunning = false; return; }
    rafRunning = true;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const now = Date.now()/1000;
    ctx.save();
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#c97c1a';
    for(let i=0;i<40;i++) {
      const x = ((i*137.5+now*3)%canvas.width);
      const y = ((i*97.3+now*2)%canvas.height);
      ctx.fillRect(x,y,2,2);
    }
    ctx.restore();
    if(Math.random()<0.05 && state.orePerSec>0) {
      const totalOwned = Object.values(state.buildings).reduce((a,b)=>a+b,0);
      if(totalOwned>0) sparkles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, life:1, vx:(Math.random()-0.5)*30, vy:-Math.random()*40-10, icon:ORES[Math.floor(Math.random()*ORES.length)]});
    }
    for(let i=sparkles.length-1;i>=0;i--) {
      const s=sparkles[i];
      s.life-=0.025; s.x+=s.vx*0.016; s.y+=s.vy*0.016;
      if(s.life<=0){sparkles.splice(i,1);continue;}
      ctx.save();
      ctx.globalAlpha=s.life*0.9;
      ctx.font=`${14+s.life*8}px serif`;
      ctx.fillText(s.icon, s.x, s.y);
      ctx.restore();
    }
    requestAnimationFrame(drawFrame);
  }
  drawFrame();
  document.addEventListener('visibilitychange', () => {
    if(!document.hidden && !rafRunning) requestAnimationFrame(drawFrame);
  });
}

// ── BONUS ORE ────────────────────────────────────────────────
const BONUS_INTERVAL_MIN = 18000;
const BONUS_INTERVAL_MAX = 40000;
let bonusOreTimer = null;

function scheduleBonus() {
  const delay = BONUS_INTERVAL_MIN + Math.random() * (BONUS_INTERVAL_MAX - BONUS_INTERVAL_MIN);
  bonusOreTimer = setTimeout(spawnBonusOre, delay);
}

function pickBonusOreType() {
  const available = BONUS_ORE_TYPES.filter(t => state.totalOre >= t.minOre);
  if(!available.length) return null;
  const pool = [];
  available.forEach(t => { const w = RARITY_WEIGHTS[t.rarity]||10; for(let i=0;i<w;i++) pool.push(t); });
  return pool[Math.floor(Math.random()*pool.length)];
}

function spawnBonusOre() {
  const type = pickBonusOreType();
  if(!type) { scheduleBonus(); return; }

  const baseVal = Math.max(state.orePerClick, state.orePerSec * 3);
  const reward  = Math.max(1, Math.floor(baseVal * type.mult));
  const rc      = RARITY_COLORS[type.rarity];

  const dur = 4000 + Math.random()*4000;
  const x   = 80 + Math.random()*(window.innerWidth - 160);
  const y   = 80 + Math.random()*(window.innerHeight - 180);

  const wrap = document.createElement('div');
  wrap.className = 'bonus-ore-wrap';
  wrap.style.cssText = `left:${x}px;top:${y}px;pointer-events:none;`;

  const ore = document.createElement('div');
  ore.className = `bonus-ore type-${type.rarity}`;
  ore.style.cssText = `--float-dur:${dur}ms;--drift-y:${-40+Math.random()*80}px;--drift-x:${-30+Math.random()*60}px;pointer-events:all;position:relative;`;
  ore.textContent = type.icon;

  const boostTag = type.boostType === 'frenzy'  ? ` ×${type.boostMult} CLICK`
                 : type.boostType === 'harvest' ? ` ×${type.boostMult} MINE`
                 : '';
  const label = document.createElement('div');
  label.className = 'bonus-ore-label';
  label.textContent = type.label + boostTag;
  label.style.color = rc.label;
  label.style.borderColor = type.boostType !== 'instant' ? 'rgba(249,199,79,0.6)' : rc.border;
  label.style.background  = rc.bg;

  ore.appendChild(label);
  wrap.appendChild(ore);

  let clicked = false;
  ore.addEventListener('click', e => {
    if(clicked) return;
    clicked = true;
    e.stopPropagation();
    state.catchedBonusOre++;
    const rarityTag = type.rarity === 'legendary' ? ' ✨LEGENDARY✨' : type.rarity === 'epic' ? ' ⚡EPIC' : '';

    if(type.boostType === 'instant') {
      state.ore += reward; state.totalOre += reward;
      spawnParticle(e.clientX, e.clientY, `${type.icon} +${fmt(reward)}`);
      showMilestone(`${type.icon}${rarityTag} ${type.label}! +${fmt(reward)} ore!`);
    } else if(type.boostType === 'frenzy') {
      state.ore += reward; state.totalOre += reward;
      const secs = Math.round(type.boostDur/1000);
      spawnParticle(e.clientX, e.clientY, `${type.icon} ×${type.boostMult} CLICK!`);
      showMilestone(`${type.icon}${rarityTag} ${type.label} — Click Frenzy ×${type.boostMult} for ${secs}s!`);
      applyBoost('frenzy', type.boostMult, type.boostDur);
    } else if(type.boostType === 'harvest') {
      state.ore += reward; state.totalOre += reward;
      const secs = Math.round(type.boostDur/1000);
      spawnParticle(e.clientX, e.clientY, `${type.icon} ×${type.boostMult} MINE!`);
      showMilestone(`${type.icon}${rarityTag} ${type.label} — Harvest Boost ×${type.boostMult} for ${secs}s!`);
      applyBoost('harvest', type.boostMult, type.boostDur);
    }
    wrap.remove();
    updateMineBtn();
  });

  document.body.appendChild(wrap);
  setTimeout(() => { if(!clicked) wrap.remove(); scheduleBonus(); }, dur+200);
}

// ── CRISIS ───────────────────────────────────────────────────
const CRISIS_MIN_INTERVAL = 45000;
const CRISIS_MAX_INTERVAL = 120000;
let crisisTimer       = null;
let crisisExpireTimer = null;
let crisisBannerEl    = null;

function scheduleCrisis() {
  const totalBuildings = Object.values(state.buildings).reduce((a,b)=>a+b, 0);
  if(totalBuildings < 3) { crisisTimer = setTimeout(scheduleCrisis, 15000); return; }
  const delay = CRISIS_MIN_INTERVAL + Math.random() * (CRISIS_MAX_INTERVAL - CRISIS_MIN_INTERVAL);
  crisisTimer = setTimeout(trySpawnCrisis, delay);
}

function trySpawnCrisis() {
  if(state.crisisActive) { scheduleCrisis(); return; }
  const eligible = CRISES.filter(c => state.totalOre >= c.minOre);
  if(!eligible.length) { scheduleCrisis(); return; }
  const crisis = eligible[Math.floor(Math.random()*eligible.length)];
  startCrisis(crisis);
}

function startCrisis(crisis) {
  state.crisisActive      = crisis;
  state.crisisClicksLeft  = crisis.clicksNeeded;
  state.crisisMultPenalty = crisis.fpsPenalty;
  state.crisisExpiresAt   = Date.now() + 60000;
  recalcFPS();
  document.body.classList.add('in-crisis');
  renderScene();

  let vig = document.getElementById('crisis-vignette');
  if(!vig) { vig = document.createElement('div'); vig.id='crisis-vignette'; vig.className='crisis-vignette'; document.body.appendChild(vig); }

  if(crisisBannerEl) crisisBannerEl.remove();
  crisisBannerEl = document.createElement('div');
  crisisBannerEl.className = 'crisis-banner';
  crisisBannerEl.id = 'crisis-banner';
  crisisBannerEl.style.cssText = `background:linear-gradient(160deg,${crisis.color} 0%,rgba(5,5,5,0.97) 100%);border:1.5px solid ${crisis.accentColor};box-shadow:0 8px 40px rgba(0,0,0,0.7),0 0 30px ${crisis.accentColor};`;
  crisisBannerEl.innerHTML = `
    <div class="crisis-header">
      <div class="crisis-icon-wrap" style="--icon-anim:${crisis.iconAnim}">${crisis.icon}</div>
      <div class="crisis-titles">
        <div class="crisis-title">${crisis.title}</div>
        <div class="crisis-building-tag">${crisis.buildingTag}</div>
      </div>
    </div>
    <div class="crisis-body">
      <div class="crisis-desc">${crisis.desc}</div>
      <div class="crisis-action-hint">
        <div class="crisis-action-icon">${crisis.actionIcon}</div>
        <div class="crisis-action-text">${crisis.actionText}</div>
      </div>
      <div class="crisis-bar-wrap"><div class="crisis-bar" id="crisis-bar" style="width:100%"></div></div>
      <div class="crisis-progress-row">
        <div class="crisis-clicks" id="crisis-clicks">${crisis.clicksNeeded} actions needed</div>
        <div class="crisis-pct" id="crisis-pct">100%</div>
      </div>
      <div style="font-size:0.72rem;color:rgba(249,65,68,0.85);margin-top:4px;text-align:center;letter-spacing:0.5px;">
        ⚠️ Production -${Math.round((1-crisis.fpsPenalty)*100)}% &nbsp;|&nbsp; <span id="crisis-countdown">60s</span> left or lose ore!
      </div>
    </div>`;
  document.body.appendChild(crisisBannerEl);

  crisisExpireTimer = setTimeout(() => {
    if(!state.crisisActive) return;
    const lostOre = Math.floor(state.ore * 0.15);
    state.ore = Math.max(0, state.ore - lostOre);
    const msg = state.crisisActive.resolveMsg.replace('!', ' — too late!') + ` Lost ${fmt(lostOre)} ore! 💀`;
    resolveCrisis(true);
    showMilestone(msg);
  }, 60000);
}

function updateCrisisBar() {
  const crisis = state.crisisActive;
  if(!crisis) return;
  const total = crisis.clicksNeeded;
  const left  = state.crisisClicksLeft;
  const pct   = Math.max(0, (left/total)*100);
  const bar   = document.getElementById('crisis-bar');
  const cl    = document.getElementById('crisis-clicks');
  const cp    = document.getElementById('crisis-pct');
  if(bar) {
    bar.style.width = pct+'%';
    const g = Math.round(199*(pct/100));
    bar.style.background = `linear-gradient(90deg,rgb(249,${g},79),#f77f00)`;
  }
  if(cl)  cl.textContent = left+' actions remaining';
  if(cp)  cp.textContent = Math.round(pct)+'%';
  const cdEl = document.getElementById('crisis-countdown');
  if(cdEl && state.crisisExpiresAt) {
    const secs = Math.max(0, Math.ceil((state.crisisExpiresAt - Date.now())/1000));
    cdEl.textContent = secs+'s';
    cdEl.style.color = secs<=10 ? '#ff4444' : 'rgba(249,65,68,0.85)';
  }
}

function resolveCrisis(expired=false) {
  const crisis = state.crisisActive;
  clearTimeout(crisisExpireTimer); crisisExpireTimer = null;
  clearInterval(holdInterval); holdInterval = null;
  state.crisisActive      = null;
  state.crisisClicksLeft  = 0;
  state.crisisMultPenalty = 1;
  state.crisisExpiresAt   = null;
  if(!expired) state.totalCrisesResolved++;
  recalcFPS();
  document.body.classList.remove('in-crisis');
  document.getElementById('crisis-vignette')?.remove();
  if(crisisBannerEl) {
    crisisBannerEl.classList.add('resolving');
    setTimeout(()=>{ if(crisisBannerEl){ crisisBannerEl.remove(); crisisBannerEl=null; } }, 380);
  }
  renderScene();
  if(!expired) showMilestone(crisis.resolveMsg);
  scheduleCrisis();
}

    html2canvas(document.getElementById('share-modal'),{backgroundColor:'#0e0a04'}).then(canvas=>{
      const link=document.createElement('a');
      link.download='mine-rush-progress.png';
      link.href=canvas.toDataURL();
      link.click();
      btn.textContent='✔ Saved!';
    });
  };
  document.getElementById('share-close-btn').onclick = () => modal.remove();
  modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
}

// ── POSTMESSAGE (embed) ──────────────────────────────────────
window.addEventListener('message', e => {
  if(e.data?.type === 'mr_do_share') openShare();
  if(e.data?.type === 'mr_do_reset') resetGame();
});

// ── MAIN LOOP ────────────────────────────────────────────────
let lastTick = Date.now();
function tick() {
  const now = Date.now();
  const dt  = Math.min((now - lastTick) / 1000, 5);
  lastTick  = now;
  if(state.orePerSec > 0) {
    const gain = state.orePerSec * dt;
    state.ore      += gain;
    state.totalOre += gain;
  }
}

let frameCount = 0;
let rafRunning = false;
function renderLoop() {
  if(document.hidden) { rafRunning = false; return; }
  rafRunning = true;
  frameCount++;

  // Incremental building affordability update
  document.querySelectorAll('.building-card').forEach(card => {
    const b = BUILDINGS.find(x => x.id === card.dataset.id);
    if(!b) return;
    const can = state.ore >= getCost(b);
    card.classList.toggle('affordable',  can);
    card.classList.toggle('cant-afford', !can);
  });

  // Incremental upgrade affordability update
  document.querySelectorAll('.upgrade-card:not(.purchased)').forEach(card => {
    const u = UPGRADES.find(x => x.id === card.dataset.id);
    if(!u) return;
    const can = state.ore >= u.cost;
    if(can && card.classList.contains('cant-afford-upg')) {
      card.classList.remove('cant-afford-upg');
      card.classList.add('available');
      card.addEventListener('click', () => buyUpgrade(u));
    }
  });

  // Counter + stat-total update every frame
  document.getElementById('ore-count').textContent = fmt(state.ore);
  document.getElementById('ore-ps').textContent = fmtRate(state.orePerSec) + ' ore/sec';
  const te = document.getElementById('stat-total');
  if(te) te.textContent = fmtShort(state.totalOre);

  // Full re-renders every ~30 frames (~500ms at 60fps)
  if(frameCount % 30 === 0) { renderUpgrades(); renderBuildings(); renderStats(); renderScene(); }
  // Crisis countdown ticks every ~60 frames (~1s at 60fps)
  if(frameCount % 60 === 0 && state.crisisActive) updateCrisisBar();

  requestAnimationFrame(renderLoop);
}

setInterval(tick, 250);

document.addEventListener('visibilitychange', () => {
  lastTick = Date.now();
  if(!document.hidden && !rafRunning) requestAnimationFrame(renderLoop);
});

setInterval(saveGame, 10000);

// ── INIT ─────────────────────────────────────────────────────
loadGame();
if(!state.firstPlayedAt) { state.firstPlayedAt = Date.now(); }
initDust();
initCanvas();

// Click zone + button
const clickZone = document.getElementById('click-zone-main');
const mineBtn   = document.getElementById('mine-btn');
clickZone.addEventListener('click', handleClick);
mineBtn.addEventListener('click', e => { e.stopPropagation(); handleClick(e); });

// Hold crisis support
mineBtn.addEventListener('mousedown', function() {
  if(!state.crisisActive || state.crisisActive.solveType !== 'hold') return;
  if(holdInterval) return;
  holdInterval = setInterval(() => {
    if(!state.crisisActive) { clearInterval(holdInterval); holdInterval = null; return; }
    state.crisisClicksLeft = Math.max(0, state.crisisClicksLeft - 1);
    updateCrisisBar();
    if(state.crisisClicksLeft <= 0) { clearInterval(holdInterval); holdInterval = null; resolveCrisis(); }
  }, 120);
});
mineBtn.addEventListener('mouseup',    () => { clearInterval(holdInterval); holdInterval = null; });
mineBtn.addEventListener('mouseleave', () => { clearInterval(holdInterval); holdInterval = null; });

document.getElementById('reset-btn').addEventListener('click', resetGame);
document.getElementById('share-btn').addEventListener('click', openShare);
window.addEventListener('beforeunload', saveGame);

// Embed mode
const isEmbed = new URLSearchParams(location.search).has('embed');
if(isEmbed) {
  document.querySelector('header').classList.add('embed');
  document.body.classList.add('embed-mode');
}

recalcFPS();
updateMineBtn();
initStatsBar();
renderBuildings();
renderUpgrades();
requestAnimationFrame(renderLoop);
scheduleBonus();
scheduleCrisis();
</script>
</body>
</html>
