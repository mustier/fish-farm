<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0a14">
<title>Son Seyyah · The Last Wanderer</title>
<style>
:root{
  --bg:#0d0a14; --panel:#171221; --panel2:#1f1830; --line:#2c2342;
  --gold:#d9a441; --gold-dim:#8a6a2e; --blood:#c0392b; --arcane:#7e6bd9;
  --bone:#e8e0cf; --bone-dim:#9a917f; --green:#5fae6e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--bone);font-family:system-ui,-apple-system,sans-serif;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
h1,h2,h3,.disp{font-family:Georgia,'Times New Roman',serif;letter-spacing:.06em}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;touch-action:manipulation}

/* ===== TOP BAR ===== */
#top{flex:0 0 auto;background:linear-gradient(180deg,#15101f,#0d0a14);border-bottom:1px solid var(--line);padding:6px 10px 5px}
#top .row{display:flex;align-items:center;gap:8px}
#pname{font-weight:700;font-size:13px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:34vw}
#plvl{font-size:11px;color:var(--bone-dim)}
#score{margin-left:auto;text-align:right}
#score .v{font-size:15px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
#score .l{font-size:9px;color:var(--bone-dim);letter-spacing:.08em;text-transform:uppercase}
#langbtn{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--bone-dim)}
#bars{display:flex;gap:8px;margin-top:5px;align-items:center}
.bar{flex:1;height:14px;background:#241c33;border:1px solid var(--line);border-radius:7px;overflow:hidden;position:relative}
.bar .fill{height:100%;border-radius:6px;transition:width .25s}
#hpfill{background:linear-gradient(90deg,#7e1f17,var(--blood))}
#xpfill{background:linear-gradient(90deg,#4a3db0,var(--arcane))}
.bar .txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;color:#fff;text-shadow:0 1px 2px #000}
#goldbox{font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap}

/* ===== BATTLE ===== */
#battle{flex:1 1 auto;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%, var(--rg1,#1a1426) 0%, var(--bg) 75%)}
#regionhdr{position:absolute;top:8px;left:0;right:0;text-align:center}
#regionname{font-size:15px;color:var(--gold);font-weight:700}
#stagedots{display:flex;gap:5px;justify-content:center;margin-top:5px}
.dot{width:8px;height:8px;border-radius:50%;background:#2c2342;border:1px solid #3a2f55}
.dot.done{background:var(--gold-dim);border-color:var(--gold)}
.dot.cur{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.dot.bossdot{border-radius:2px;transform:rotate(45deg)}
#enemywrap{text-align:center;position:relative}
#enemy{font-size:84px;line-height:1;filter:drop-shadow(0 6px 14px rgba(0,0,0,.6));transition:transform .08s;display:inline-block}
#enemy.hit{animation:ehit .18s}
@keyframes ehit{0%{filter:brightness(3) drop-shadow(0 0 12px #fff)}100%{filter:brightness(1)}}
#enemy.bossglow{filter:drop-shadow(0 0 18px rgba(192,57,43,.7))}
#ename{margin-top:6px;font-size:14px;font-weight:700}
#etraits{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:5px}
.etrait{font-size:9.5px;border:1px solid var(--line);border-radius:6px;padding:1px 6px;display:flex;align-items:center;gap:3px;background:rgba(36,28,51,.7);font-weight:700}
.etrait .ti{font-size:11px}
#ename .btag{color:var(--blood);font-size:11px;letter-spacing:.15em;margin-right:5px}
#ehpbar{width:200px;height:13px;margin:7px auto 0;background:#241c33;border:1px solid var(--line);border-radius:7px;overflow:hidden;position:relative}
#ehpfill{height:100%;background:linear-gradient(90deg,#6e1610,#d04a36);transition:width .12s}
#ehptxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px #000}
#tapHint{margin-top:10px;font-size:11px;color:var(--bone-dim);animation:pulse 2s infinite}
@keyframes pulse{50%{opacity:.35}}
#battle.shake{animation:shake .25s}
@keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-6px,3px)}40%{transform:translate(5px,-4px)}60%{transform:translate(-4px,2px)}80%{transform:translate(3px,-2px)}}
.dmgnum{position:absolute;font-weight:800;font-size:18px;pointer-events:none;animation:floatup .9s forwards;text-shadow:0 2px 4px #000;z-index:5}
.dmgnum.crit{font-size:26px;color:var(--gold)}
.dmgnum.player{color:#fff}
.dmgnum.hurt{color:#ff6b5b;font-size:15px}
.dmgnum.heal{color:var(--green);font-size:14px}
@keyframes floatup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.15)}}
.spark{position:absolute;pointer-events:none;font-size:14px;animation:sparkfly 1s forwards;z-index:6}
@keyframes sparkfly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.4)}}
#sigil{position:absolute;font-size:26px;opacity:0;pointer-events:none;transition:opacity 1s;z-index:12;cursor:pointer;
  filter:drop-shadow(0 0 8px var(--arcane));animation:sigilpulse 2s ease-in-out infinite;color:var(--arcane)}
#sigil.on{opacity:.85;pointer-events:auto}
@keyframes sigilpulse{0%,100%{opacity:.85;transform:scale(1);filter:drop-shadow(0 0 6px var(--arcane))}50%{opacity:.25;transform:scale(1.18);filter:drop-shadow(0 0 16px var(--arcane)) drop-shadow(0 0 26px rgba(126,107,217,.6))}}
#lvlbanner{position:absolute;top:38%;left:0;right:0;text-align:center;font-size:22px;color:var(--gold);font-weight:800;
  opacity:0;pointer-events:none;text-shadow:0 0 18px var(--gold);font-family:Georgia,serif;letter-spacing:.12em}
#lvlbanner.show{animation:bannerpop 1.6s forwards}
@keyframes bannerpop{0%{opacity:0;transform:scale(.6)}25%{opacity:1;transform:scale(1.1)}70%{opacity:1;transform:scale(1)}100%{opacity:0}}

#pausebtn{position:absolute;top:8px;right:10px;z-index:9;font-size:15px;border:1px solid var(--line);border-radius:8px;padding:3px 10px;color:var(--bone-dim);background:rgba(23,18,33,.65)}
#allies{position:absolute;left:8px;bottom:15%;display:flex;flex-direction:column;gap:12px;z-index:7}
.ally{font-size:26px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.6));animation:bob 2.6s ease-in-out infinite;position:relative;width:34px;text-align:center}
.ally .alv{position:absolute;bottom:-5px;right:-9px;font-size:9px;background:#241c33;border:1px solid var(--gold-dim);color:var(--gold);border-radius:7px;padding:0 4px;font-weight:800}
@keyframes bob{50%{transform:translateY(-6px)}}
.ally.lunge{animation:lunge .34s ease-out}
@keyframes lunge{0%{transform:translate(0,0) scale(1)}35%{transform:translate(22px,-14px) scale(1.18) rotate(6deg)}100%{transform:translate(0,0) scale(1)}}
.ally.casting{animation:cast .5s ease-out}
@keyframes cast{0%{transform:scale(1)}40%{transform:scale(1.2) translateY(-8px);filter:drop-shadow(0 0 10px var(--green))}100%{transform:scale(1)}}
.dmgnum.ally{color:#8fd0ff;font-size:15px;animation:allyfloat 1s forwards}
@keyframes allyfloat{0%{opacity:1;transform:translate(0,0) scale(.9)}30%{opacity:1;transform:translate(14px,-16px) scale(1.1)}100%{opacity:0;transform:translate(34px,-44px) scale(.85)}}
.allybolt{position:absolute;pointer-events:none;font-size:16px;z-index:6;animation:allybolt .35s ease-in forwards}
@keyframes allybolt{0%{opacity:0;transform:translate(0,0) scale(.6)}20%{opacity:1}100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(1.1)}}
.skbar{height:5px;background:#241c33;border-radius:3px;margin-top:5px;overflow:hidden}
.skbar .f{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:3px}
.skbar.evo .f{background:linear-gradient(90deg,#5a4ba8,var(--arcane))}
.evotag{font-size:9px;color:var(--arcane);border:1px solid var(--arcane);border-radius:5px;padding:0 4px;margin-left:5px;letter-spacing:.05em}

/* ===== TABS + PANEL ===== */
#tabbar{flex:0 0 auto;display:flex;border-top:1px solid var(--line);background:var(--panel)}
#tabbar button{flex:1;padding:9px 0 10px;font-size:10.5px;color:var(--bone-dim);display:flex;flex-direction:column;gap:2px;align-items:center;position:relative}
#tabbar button .ic{font-size:17px}
#tabbar button.act{color:var(--gold);background:var(--panel2)}
.tbadge{position:absolute;top:3px;right:calc(50% - 22px);min-width:16px;height:16px;padding:0 4px;
  background:var(--blood);color:#fff;border-radius:9px;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.5);
  animation:badgepop .3s}
@keyframes badgepop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
.rowitem.flash{animation:rowflash 1.6s}
@keyframes rowflash{0%,100%{background:var(--panel)}20%,60%{background:#3a2d12;border-color:var(--gold)}}
#panel{flex:0 0 auto;max-height:46vh;overflow-y:auto;background:var(--panel2);border-top:1px solid var(--line);
  padding:12px 12px 18px;display:none;-webkit-overflow-scrolling:touch}
#panel.open{display:block}
.ph{font-size:13px;color:var(--gold);font-weight:700;margin-bottom:8px;letter-spacing:.08em;font-family:Georgia,serif}
.rowitem{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 10px;margin-bottom:7px}
.rowitem .grow{flex:1;min-width:0}
.rowitem .t1{font-size:12.5px;font-weight:700}
.rowitem .t2{font-size:10.5px;color:var(--bone-dim);margin-top:1px}
.btn{background:linear-gradient(180deg,#2a2142,#1f1830);border:1px solid #41356a;border-radius:8px;
  padding:7px 12px;font-size:11.5px;font-weight:700;color:var(--bone);white-space:nowrap}
.btn:active{transform:scale(.95)}
.btn.gold{border-color:var(--gold-dim);color:var(--gold)}
.btn.dis{opacity:.38;pointer-events:none}
.btn.small{padding:5px 9px;font-size:10.5px}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.statbox{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 9px}
.statbox .l{font-size:9px;color:var(--bone-dim);text-transform:uppercase;letter-spacing:.07em}
.statbox .v{font-size:14px;font-weight:800;margin-top:1px}
.rarity0{color:#b9b2a4}.rarity1{color:#5b9bd5}.rarity2{color:#a06bd9}.rarity3{color:var(--gold)}
.regioncard{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;background:var(--panel)}
.regioncard.cur{border-color:var(--gold-dim);background:linear-gradient(180deg,#231a36,#1a1428)}
.regioncard.lock{opacity:.45}
.regioncard .re{font-size:26px}
/* ===== MAP TREE VIEW ===== */
#maptree{position:relative;padding:6px 0 4px}
.mnode{position:relative;display:flex;align-items:center;gap:12px;padding:14px 4px 6px;min-height:54px}
.mconn{position:absolute;top:-2px;left:27px;width:3px;height:20px;background:var(--line);z-index:0}
.mnode.right .mconn{left:auto;right:27px}
.mconn.lit{background:linear-gradient(180deg,var(--gold),var(--gold-dim))}
.mnode.right{flex-direction:row-reverse;text-align:right}
.mnode .orb{width:54px;height:54px;flex:0 0 54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:27px;position:relative;z-index:2;border:2px solid var(--line);background:#1a1428;transition:transform .15s}
.mnode .orb:active{transform:scale(.92)}
.mnode.done .orb{border-color:var(--gold);background:radial-gradient(circle,#2e2410,#1a1428);box-shadow:0 0 12px rgba(217,164,65,.35)}
.mnode.cur .orb{border-color:var(--gold);background:radial-gradient(circle,#3a2d12,#1a1428);box-shadow:0 0 0 3px rgba(217,164,65,.25),0 0 18px rgba(217,164,65,.5);animation:orbpulse 2s infinite}
@keyframes orbpulse{50%{box-shadow:0 0 0 5px rgba(217,164,65,.12),0 0 22px rgba(217,164,65,.6)}}
.mnode.lock .orb{opacity:.5;filter:grayscale(1)}
.mnode .minfo{flex:1;min-width:0}
.mnode .mname{font-size:13px;font-weight:700;font-family:Georgia,serif}
.mnode.done .mname,.mnode.cur .mname{color:var(--gold)}
.mnode .mmeta{font-size:10.5px;color:var(--bone-dim);margin-top:2px}
.mnode .mrune{position:absolute;top:4px;font-size:13px;color:var(--arcane);z-index:3}
.mnode:not(.right) .mrune{left:42px}.mnode.right .mrune{right:42px}
.mnode .mbtn{margin-top:5px}
.mcheck{position:absolute;bottom:-2px;right:-2px;font-size:13px;background:var(--gold);color:#1a1207;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;z-index:3;font-weight:800}
.mspecial{border:1px dashed var(--arcane);border-radius:12px;padding:12px;margin-top:10px;text-align:center;background:rgba(126,107,217,.08)}
.mspecial.era{border-color:var(--gold-dim);background:rgba(217,164,65,.08)}
.achrow{display:flex;gap:9px;align-items:center;padding:7px 4px;border-bottom:1px solid var(--line);font-size:12px}
.achrow.no{opacity:.4}

/* ===== OVERLAYS ===== */
.overlay{position:fixed;inset:0;background:rgba(8,6,14,.92);z-index:50;display:none;
  align-items:center;justify-content:center;padding:18px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--panel2);border:1px solid #41356a;border-radius:16px;padding:20px 16px;max-width:430px;width:100%;
  box-shadow:0 14px 50px rgba(0,0,0,.7);max-height:88vh;overflow-y:auto}
.modal h2{font-size:17px;color:var(--gold);text-align:center;margin-bottom:4px}
.modal .sub{font-size:11.5px;color:var(--bone-dim);text-align:center;margin-bottom:14px;line-height:1.5}
.choice{border:1.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px;background:var(--panel);transition:border-color .15s}
.choice.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
.choice .cn{font-size:14px;font-weight:800;display:flex;gap:8px;align-items:center}
.choice .adv{font-size:11px;color:var(--green);margin-top:5px;line-height:1.45}
.choice .cost{font-size:11px;color:#e2756a;margin-top:2px;line-height:1.45}
.modal input[type=text]{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;
  padding:11px;color:var(--bone);font-size:14px;margin:10px 0;text-align:center}
.modal input:focus{outline:none;border-color:var(--gold-dim)}
.bigbtn{width:100%;background:linear-gradient(180deg,#b8893a,#8a6a2e);color:#1a1207;font-weight:800;
  border-radius:10px;padding:13px;font-size:14px;letter-spacing:.05em;margin-top:6px}
.bigbtn:active{transform:scale(.97)}
.bigbtn.dis{opacity:.4;pointer-events:none}
.memcell{font-size:30px;padding:14px;border:1.5px solid var(--line);border-radius:12px;background:var(--panel);transition:all .1s}
.memcell.lit{border-color:var(--gold);background:#3a2d12;transform:scale(1.08);box-shadow:0 0 14px var(--gold)}
.runechip{display:inline-flex;flex-direction:column;align-items:center;gap:2px;border:1.5px solid var(--arcane);
  border-radius:10px;padding:9px 11px;margin:4px;background:var(--panel);font-size:20px}
.runechip .num{font-size:11px;color:var(--arcane);font-weight:800}
.runechip.done{border-color:var(--gold);opacity:.5}
.pzmsg{text-align:center;font-size:12px;min-height:18px;margin-top:8px;color:#e2756a;font-weight:700}
.pzmsg.ok{color:var(--green)}
#title-screen .modal{text-align:center}
#gametitle{font-size:30px;color:var(--gold);text-shadow:0 0 24px rgba(217,164,65,.4);letter-spacing:.14em}
#gamesub{font-size:12px;color:var(--bone-dim);margin:10px 0 4px;line-height:1.6}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:#241c33;border:1px solid var(--gold-dim);
  color:var(--bone);font-size:12px;padding:9px 16px;border-radius:20px;z-index:60;animation:toastin 2.6s forwards;
  max-width:86vw;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.5)}
@keyframes toastin{0%{opacity:0;transform:translate(-50%,12px)}10%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0}}
#deathnotice{position:absolute;inset:0;z-index:40;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(80,12,8,.4),rgba(8,6,14,.88));text-align:center;padding:24px}
#deathnotice.show{display:flex;animation:deathin .4s}
@keyframes deathin{0%{opacity:0}100%{opacity:1}}
#deathnotice .skull{font-size:62px;filter:drop-shadow(0 0 16px rgba(192,57,43,.6));animation:skullpulse 2s infinite}
@keyframes skullpulse{50%{transform:scale(1.08)}}
#deathnotice .dt{font-family:Georgia,serif;font-size:22px;color:var(--blood);letter-spacing:.1em;margin-top:8px;font-weight:800}
#deathnotice .dl{font-size:13px;color:var(--bone);margin-top:14px;line-height:1.7;max-width:300px}
#deathnotice .dgold{color:#e2756a;font-weight:800}
#deathnotice .dhp{color:var(--green);font-weight:800}
#deathnotice button{margin-top:20px}
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<div id="top">
  <div class="row">
    <span id="pname">—</span><span id="plvl"></span>
    <span id="goldbox">🪙 <span id="goldv">0</span></span>
    <div id="score"><div class="v" id="scorev">0</div><div class="l" id="scorel">Efsane Puanı</div></div>
    <button id="langbtn">EN</button>
  </div>
  <div id="bars">
    <div class="bar"><div class="fill" id="hpfill"></div><div class="txt" id="hptxt"></div></div>
    <div class="bar"><div class="fill" id="xpfill"></div><div class="txt" id="xptxt"></div></div>
  </div>
</div>

<div id="battle">
  <div id="regionhdr">
    <div id="regionname"></div>
    <div id="stagedots"></div>
  </div>
  <div id="enemywrap">
    <div id="enemy">🐺</div>
    <div id="ename"></div>
    <div id="etraits"></div>
    <div id="ehpbar"><div id="ehpfill"></div><div id="ehptxt"></div></div>
    <div id="tapHint"></div>
  </div>
  <div id="sigil">𖤓</div>
  <div id="allies"></div>
  <button id="pausebtn">⏸</button>
  <div id="lvlbanner"></div>
  <div id="deathnotice"></div>
</div>

<div id="panel"></div>

<div id="tabbar">
  <button data-tab="bag"><span class="ic">🎒</span><span class="tl" id="tl-bag"></span></button>
  <button data-tab="skill"><span class="ic">✨</span><span class="tl" id="tl-skill"></span></button>
  <button data-tab="shop"><span class="ic">🏪</span><span class="tl" id="tl-shop"></span></button>
  <button data-tab="map"><span class="ic">🗺️</span><span class="tl" id="tl-map"></span></button>
  <button data-tab="ach"><span class="ic">🏆</span><span class="tl" id="tl-ach"></span></button>
</div>

<!-- Title screen -->
<div class="overlay open" id="title-screen">
  <div class="modal">
    <h1 id="gametitle">SON SEYYAH</h1>
    <div id="gamesub"></div>
    <div style="margin:8px 0"><button id="tlang" class="btn">🌐 Türkçe / English</button></div>
    <input type="text" id="nameinput" maxlength="16">
    <button class="bigbtn" id="startbtn"></button>
  </div>
</div>

<!-- Generic modal (class choices, puzzles, endings) -->
<div class="overlay" id="modal-ov">
  <div class="modal" id="modal-box"></div>
</div>

<script>
'use strict';
/* ================= DATA ================= */
const UI={
 sub:{tr:'Büyük Karartı yedi diyarı yuttu.<br>Mühürleri kır, gizli rünleri bul.',en:'The Great Dark devoured seven realms.<br>Break the seals, find the hidden runes.'},
 namePh:{tr:'Seyyahın adı...',en:'Wanderer name...'},
 start:{tr:'Yolculuğa Başla',en:'Begin the Journey'},
 cont:{tr:'Devam Et',en:'Continue'},
 scorel:{tr:'Efsane Puanı',en:'Legend Score'},
 lv:{tr:'Sv.',en:'Lv.'},
 stage:{tr:'Aşama',en:'Stage'},
 tap:{tr:'⚔️ Saldırmak için düşmana dokun',en:'⚔️ Tap the enemy to attack'},

function stats(){
 let dmg=3+S.level*2.4, hp=55+S.level*15, crit=5, dodge=2, regen=0, critX=2, eSlow=1, taken=1, atkCost=0, goldM=1;
 const add=b=>{dmg+=b.dmg||0;hp+=b.hp||0;crit+=b.crit||0;dodge+=b.dodge||0;regen+=b.rg||0;critX+=b.cx||0;if(b.tk)taken*=(1-b.tk/100);goldM+=(b.gd||0)/100;};
 // skill tree (base + evolved forms)
 if(S.cls)for(const sk of SKILLS[S.cls]){
  add(sk.f(Math.min(S.sk[sk.id]||0,sk.max)));
  if((sk.id+'2')in S.sk)add(sk.evo.f(Math.min(S.sk[sk.id+'2']||0,sk.evo.max)));
 }
 // gear
 if(S.eq.weapon)dmg+=S.eq.weapon.v;
 if(S.eq.armor)hp+=S.eq.armor.v;
 if(S.eq.trinket){if(S.eq.trinket.k==='crit')crit+=S.eq.trinket.v;else dodge+=S.eq.trinket.v;}
 // shop upgrades (geometric sums)
 dmg+=3*(Math.pow(1.18,S.upg.sharp)-1)/0.18;
 hp+=14*(Math.pow(1.2,S.upg.plate)-1)/0.2;
 // class
 if(S.cls==='warrior'){hp*=1.6;dmg*=0.95;taken*=0.9}
 if(S.cls==='mage'){dmg*=1.5;hp*=0.8}
 if(S.cls==='shadow'){crit+=10;dodge+=8}
 // sub
 if(S.sub==='berserker'){dmg*=1.8;taken*=1.35}
 if(S.sub==='guardian'){hp*=1.8;dmg*=0.8;regen+=1}
 if(S.sub==='firelord'){dmg*=1.7;hp*=0.8}
 if(S.sub==='icesage'){dmg*=1.25;eSlow=1.35}
 if(S.sub==='assassin'){crit+=25;critX=3;hp*=0.75}
 if(S.sub==='phantom'){dodge+=25;dmg*=1.15}
 // pact
 if(S.pact==='blood'){dmg*=1.6;atkCost=0.02}
 if(S.pact==='void'){dmg*=1.4;crit+=15;regen=-1;dodge-=10}
 if(S.pact==='light'){hp*=1.4;regen+=2;dmg*=0.9}
 // runes (collected hidden runes grant passive bonuses)
 const rb={gold:goldM,dmgM:1,hpM:1,crit:0,dodge:0,regen:0,critX:0};
 for(const r of S.runes)RUNE_BONUS[r].f(rb);
 goldM=rb.gold;dmg*=rb.dmgM;hp*=rb.hpM;crit+=rb.crit;dodge+=rb.dodge;regen+=rb.regen;critX+=rb.critX;
 const eraM=1+S.era*0.5;
 dmg*=eraM;hp*=eraM;
 crit=Math.min(80,Math.max(0,crit));dodge=Math.min(70,Math.max(0,dodge));
 return{dmg:Math.round(dmg),hp:Math.round(hp),crit,dodge,regen,critX,eSlow,taken,atkCost,gold:goldM};
}
function riskMult(){
 let m=1;
 if(S.cls)m*=CLASSES[S.cls].risk;
 if(S.sub){for(const k in SUBS)for(const s of SUBS[k])if(s.id===S.sub)m*=s.risk;}
 if(S.pact){for(const p of PACTS)if(p.id===S.pact)m*=p.risk;}
 return m;
}
function score(){
 const base=S.level*15+S.kills*2+S.bossKills*60+S.runes.length*120+S.ach.length*40+S.era*500+(S.trueDown?1000:0);
 const v=Math.floor(base*riskMult()*(1+S.era*0.25))-S.deaths*40-S.pfails*10;
 return Math.max(0,v);
}

function tabBadges(){
 const st=stats();const b={bag:0,skill:0,shop:0,map:0,ach:0};
 // CHARACTER (bag): inventory items that are an upgrade over current equip
 for(const it of S.inv){const cur=S.eq[it.slot];
  if(!cur)b.bag++;
  else if((it.slot==='trinket')?(it.k===cur.k&&it.v>cur.v):it.v>cur.v)b.bag++;}
 // SKILLS: spendable points if anything can be improved
 if(S.cls&&S.pts>0){
  for(const sk of SKILLS[S.cls]){
   const evolved=(sk.id+'2')in S.sk;
   if(evolved){if((S.sk[sk.id+'2']||0)<sk.evo.max){b.skill=S.pts;break;}}
   else if((S.sk[sk.id]||0)<sk.max){b.skill=S.pts;break;}
   else if(S.pts>=3){b.skill=S.pts;break;}}}
 // SHOP: affordable actions
 if(S.gold>=shopCost('sharp'))b.shop++;
 if(S.gold>=shopCost('plate'))b.shop++;
 if(S.gold>=shopCost('potion')&&hpNow<st.hp)b.shop++;
 for(const c of COMPS){const cd=compData(c.id);if(S.level<c.req)continue;
  if(cd.count<COMP_COPIES&&S.gold>=compAddCost(c,cd.count))b.shop++;
  if(cd.count>0&&cd.lv<COMP_MAX&&S.gold>=compUpCost(c,cd.lv))b.shop++;}
 // MAP: unlocked regions you've never set foot in
 for(let i=0;i<=S.maxRegion&&i<7;i++)if(S.reach[i]===0&&i!==S.region)b.map++;
 if(S.runes.length===7&&!S.trueDown)b.map++;
 if(S.maxRegion>=7)b.map++;
 return b;
}

function shopGain(key){
 const st=stats();
 if(key==='sharp'){
  // next sharp level adds one more term: 3*1.18^lv, scaled by class/era/rune multipliers approximated via current dmg ratio
  const raw=3*Math.pow(1.18,S.upg.sharp);
  return '+'+fmt(Math.max(1,Math.round(raw)))+' '+L(UI.dmg)+' ('+L(UI.base)+')';
 }
 if(key==='plate'){
  const raw=14*Math.pow(1.2,S.upg.plate);
  return '+'+fmt(Math.max(1,Math.round(raw)))+' '+L(UI.hp)+' ('+L(UI.base)+')';
 }
 if(key==='potion'){
  const heal=Math.round(st.hp*0.6);
  return '+'+fmt(heal)+' '+L(UI.hp)+' '+L(UI.now);
 }
 return '';
}
function shopCost(key){if(key==='sharp')return Math.floor(25*Math.pow(1.55,S.upg.sharp));
 if(key==='plate')return Math.floor(22*Math.pow(1.55,S.upg.plate));
 if(key==='potion')return Math.floor(30*Math.pow(1.6,S.region));return 0;}
function compUpGain(c,cd){
 // what +1 level adds (per-second terms), assuming current count
 const per=(c.int/1000);const st=stats();const n=cd.count||1;
 if(c.kind==='heal'){
  const inc=Math.round(st.hp*0.4/100*n); // 0.4% per level term
  return '+'+fmt((inc/per).toFixed(0))+' '+L(UI.hpPerSec);
 }
 if(c.kind==='pct'){
  return '+'+(c.pow*n).toFixed(1)+'% '+L(UI.perHit);
 }
 const inc=Math.round(st.dmg*c.pow*n);
 return '+'+fmt((inc/per).toFixed(0))+' '+L(UI.dps);
}
function compEffect(c,cd){
 if(cd.count<1)return L(c.d);
 const per=(c.int/1000);const st=stats();
 if(c.kind==='heal'){
  const each=Math.round(st.hp*(0.8+0.4*cd.lv)/100*cd.count);
  return L(UI.healEach).replace('{e}',fmt(each)).replace('{s}',per)+' · ≈'+fmt((each/per).toFixed(0))+' '+L(UI.hpPerSec);
 }
 if(c.kind==='pct'){
  return L(UI.pctHit).replace('{p}',(c.pow*cd.lv*cd.count).toFixed(0)).replace('{s}',per);
 }
 const each=Math.round(st.dmg*c.pow*cd.lv*cd.count);
 return L(UI.dmgEach).replace('{e}',fmt(each)).replace('{s}',per)+' · ≈'+fmt((each/per).toFixed(0))+' '+L(UI.dps);
}

function spawn(trueFight){
 const r=REGIONS[S.region];const boss=S.stage===9;const gs=S.region*10+S.stage;
 if(trueFight){
  const b=Math.round(16*Math.pow(1.16,69))*22;
  E={e:'🌑',n:{tr:UI.truename.tr,en:UI.truename.en},boss:true,tru:true,hp:b,max:b,dmg:Math.round(3*Math.pow(1.13,69)*1.7),int:1800,t:0,traits:[],poison:0,gold:99999,xp:99999};
 }else{
  const pick=boss?r.boss:r.mobs[Math.floor(Math.random()*r.mobs.length)];
  let hp=Math.round(16*Math.pow(1.16,gs))*(boss?5.5:1);
  let dmg=Math.round(3.2*Math.pow(1.135,gs))*(boss?1.5:1);
  let int=boss?2050:2450;
  const traits=rollTraits(gs,boss);
  if(traits.includes('tough'))hp=Math.round(hp*1.6);
  if(traits.includes('brutal'))dmg=Math.round(dmg*1.5);
  if(traits.includes('swift'))int=Math.round(int*0.6);
  const tb=1+traits.length*0.35;
  E={e:pick[0],n:pick[1],boss,hp,max:hp,dmg,int,t:0,traits,poison:0,
   gold:Math.round(5*Math.pow(1.14,gs))*(boss?8:1)*tb|0,xp:Math.round(8*Math.pow(1.155,gs))*(boss?6:1)*tb|0};
 }
 renderBattle();
}
function attack(ev){
 if(!E||modalOpen||deathOpen)return;
 const st=stats();
 // evasive: enemy may dodge
 if(hasTrait('evasive')&&Math.random()<0.2){floatNum(S.lang==='tr'?'savuşturdu!':'evaded!','hurt');
  const en0=$('enemy');en0.classList.remove('hit');void en0.offsetWidth;en0.classList.add('hit');return;}
 if(st.atkCost>0){hpNow=Math.max(1,hpNow-st.hp*st.atkCost);}
 let d=st.dmg*(0.9+Math.random()*0.2);
 const isCrit=Math.random()*100<st.crit;
 if(isCrit){d*=st.critX;shake();sparks(4,'✦');}
 if(hasTrait('armored'))d*=0.65;
 d=Math.round(d);E.hp-=d;
 floatNum(fmt(d),isCrit?'crit':'player');
 // thorns: reflect damage to player
 if(hasTrait('thorns')){const rf=Math.round(d*0.25);hpNow-=rf;floatNum('-'+fmt(rf),'hurt');if(hpNow<=0){die();return;}}
 const en=$('enemy');en.classList.remove('hit');void en.offsetWidth;en.classList.add('hit');
 $('ehpfill').style.width=Math.max(0,E.hp/E.max*100)+'%';
 $('ehptxt').textContent=fmt(Math.max(0,E.hp))+' / '+fmt(E.max);
 renderTop();
 if(E.hp<=0)kill();
}
function kill(){
 const wasBoss=E.boss,wasTrue=E.tru;
 S.kills++;ach('first');
 if(S.dieStreak){S.dieStreak=0;S.dieAt=-1;}
 S.gold+=Math.round(E.gold*stats().gold);S.xp+=E.xp;
 if(S.gold>=1000)ach('rich');
 sparks(wasBoss?10:3,'🪙');
 if(wasTrue){E=null;S.trueDown=true;ach('truth');winScreen();return;}
 if(wasBoss){S.bossKills++;ach('boss1');S.pts++;toast('✨ '+L(UI.ptBoss));
  dropLoot(true);
  if(S.region===S.maxRegion)S.maxRegion=S.region+1;
  toast('👑 '+L(UI.regiondone));
  if(S.region<6){S.region++;S.stage=0;}
  else{S.stage=0;}
 }else{
  dropLoot();
  S.stage++;
  if(S.stage>S.reach[S.region])S.reach[S.region]=S.stage;
  if(S.reach[S.region]===5&&!S.runes.includes(S.region))toast('༄ '+L(UI.sigilhint));
 }
 checkLevel();E=null;
 setTimeout(()=>{spawn();},380);
 renderTop();save();
}
function dropLoot(force){
 if(!force&&Math.random()>0.22)return;
 if(S.inv.length>=10)return;
 const gs=S.region*10+S.stage;
 const roll=Math.random();let r=roll<0.55?0:roll<0.85?1:roll<0.97?2:3;
 if(force)r=Math.max(2,r);
 const slots=['weapon','armor','trinket'];const slot=slots[Math.floor(Math.random()*3)];
 const m=RAR[r].m;let it;
 if(slot==='weapon')it={slot,r,e:'⚔️',v:Math.round((4+gs*1.6)*m),g:Math.round(8*(r+1)*(S.region+1))};
 else if(slot==='armor')it={slot,r,e:'🛡️',v:Math.round((16+gs*5)*m),g:Math.round(8*(r+1)*(S.region+1))};
 else it={slot,r,e:'💍',k:Math.random()<0.5?'crit':'dodge',v:Math.round((2+S.region*0.8)*m),g:Math.round(10*(r+1)*(S.region+1))};
 S.inv.push(it);
 const idx=S.inv.length-1;
 toast('🎁 '+L(UI.drop)+': '+itemLabel(it).name+' 👆',()=>openItem(idx));
}
function openItem(idx){
 renderPanel('bag');
 setTimeout(()=>{
  const p=$('panel');const rows=p.querySelectorAll('[data-inv]');
  for(const r of rows){if(+r.dataset.inv===idx){
   r.classList.add('flash');
   r.scrollIntoView({behavior:'smooth',block:'center'});
   break;}}
 },50);
}
function checkLevel(){
 let upped=false,before=S.level;
 while(S.xp>=xpNeed()){S.xp-=xpNeed();S.level++;S.pts++;upped=true;}
 if(upped){const st=stats();hpNow=st.hp;banner('✦ '+L(UI.lvlup)+' '+S.level+' ✦');sparks(8,'✦');
  if(S.level>=10)ach('lvl10');if(S.level>=25)ach('lvl25');if(S.level>=50)ach('lvl50');
  // newly unlocked companion?
  for(const c of COMPS)if(before<c.req&&S.level>=c.req&&compData(c.id).count===0)toast(c.e+' '+L(UI.allyNew));
  maybeChoice();}
}
/* enemy + regen + companion ticks */
let acc=0,acc2=0,compT={};
function floatAt(el,txt,cls){const b=$('battle'),d=document.createElement('div');d.className='dmgnum '+cls;d.textContent=txt;
 const r=el.getBoundingClientRect(),br=b.getBoundingClientRect();
 d.style.left=(r.left-br.left+r.width/2-14+(Math.random()*30-15))+'px';
 d.style.top=(r.top-br.top-6)+'px';
 b.appendChild(d);setTimeout(()=>d.remove(),900);}
function renderAllies(){
 const w=$('allies');let h='';let i=0;
 for(const c of COMPS){const cd=compData(c.id);if(!cd.count)continue;
  for(let k=0;k<cd.count;k++){
   h+='<div class="ally" id="al-'+c.id+'-'+k+'" style="animation-delay:'+(i*0.28)+'s">'+c.e+'<span class="alv">'+cd.lv+'</span></div>';i++;}}
 w.innerHTML=h;
}
function allyBolt(fromEl,emoji){
 if(!fromEl)return;
 const b=$('battle'),en=$('enemy');if(!en)return;
 const fr=fromEl.getBoundingClientRect(),er=en.getBoundingClientRect(),br=b.getBoundingClientRect();
 const bolt=document.createElement('div');bolt.className='allybolt';bolt.textContent=emoji;
 bolt.style.left=(fr.left-br.left+fr.width/2-8)+'px';
 bolt.style.top=(fr.top-br.top+fr.height/2-8)+'px';
 bolt.style.setProperty('--bx',(er.left-fr.left+er.width/2-fr.width/2)+'px');
 bolt.style.setProperty('--by',(er.top-fr.top+er.height/2-fr.height/2)+'px');
 b.appendChild(bolt);setTimeout(()=>bolt.remove(),350);
}
function enemyHitFlash(){const en=$('enemy');if(en){en.classList.remove('hit');void en.offsetWidth;en.classList.add('hit');}}
const BOLT={raven:'🪶',wolf:'🦷',drake:'🔥',wisp:'💫'};
function allyAct(c,cd,st){
 const lv=cd.lv,count=cd.count;
 const anim=c.kind==='heal'?'casting':'lunge';
 for(let k=0;k<count;k++){const el=$('al-'+c.id+'-'+k);
  if(el){el.classList.remove(anim);void el.offsetWidth;el.classList.add(anim);setTimeout(()=>el.classList.remove(anim),520);}}
 const el0=$('al-'+c.id+'-0');
 if(c.kind==='heal'){
  if(hpNow<st.hp){const h=st.hp*(0.8+0.4*lv)/100*count;hpNow=Math.min(st.hp,hpNow+h);
   if(el0)floatAt(el0,'+'+fmt(h),'heal');sparks(2,'✨');renderTop();}
  return;}
 if(!E)return;
 let d;
 if(c.kind==='pct')d=E.max*c.pow*lv/100*count;
 else d=st.dmg*c.pow*lv*count*(0.9+Math.random()*0.2);
 if(hasTrait('armored')&&c.kind!=='pct')d*=0.65;
 d=Math.round(d);E.hp-=d;
 // projectile from the ally, then enemy flash on impact
 allyBolt(el0,BOLT[c.id]||'✦');
 setTimeout(()=>{enemyHitFlash();if(el0)floatAt(el0,fmt(d),'ally');else floatNum(fmt(d),'ally');},300);
 $('ehpfill').style.width=Math.max(0,E.hp/E.max*100)+'%';
 $('ehptxt').textContent=fmt(Math.max(0,E.hp))+' / '+fmt(E.max);
 if(E.hp<=0)kill();
}
setInterval(()=>{
 if(!S.started||modalOpen||deathOpen)return;
 const st=stats();
 if(E){
  E.t+=100;
  if(E.t>=E.int*st.eSlow){E.t=0;
   if(Math.random()*100<st.dodge){floatNum(S.lang==='tr'?'kaçındın!':'dodged!','heal');}
   else{const d=Math.round(E.dmg*st.taken*(0.9+Math.random()*0.2));hpNow-=d;floatNum('-'+fmt(d),'hurt');
    if(E.boss)shake();
    if(E.traits&&E.traits.includes('venom'))E.poison=3; // poison stacks duration
    if(E.traits&&E.traits.includes('vampiric')){const heal=Math.round(d*0.5);E.hp=Math.min(E.max,E.hp+heal);
     $('ehpfill').style.width=Math.max(0,E.hp/E.max*100)+'%';$('ehptxt').textContent=fmt(Math.max(0,E.hp))+' / '+fmt(E.max);}
    if(hpNow<=0)die();}
   renderTop();}
 }
 for(const c of COMPS){const cd=compData(c.id);if(!cd.count)continue;
  compT[c.id]=(compT[c.id]||0)+100;
  if(compT[c.id]>=c.int){compT[c.id]=0;allyAct(c,cd,st);}}
 acc+=100;
 if(acc>=1000){acc=0;
  if(st.regen>0&&hpNow<st.hp){hpNow=Math.min(st.hp,hpNow+st.hp*st.regen/100);}
  // poison damage over time
  if(E&&E.poison>0){E.poison--;const pd=Math.round(E.dmg*0.3*st.taken);hpNow-=pd;floatNum('☠'+fmt(pd),'hurt');if(hpNow<=0){die();}}
  renderTop();
  // live-refresh the open panel, but not right after a tap (avoids buttons shifting mid-press)
  if(curTab&&Date.now()-lastTap>900)renderPanel(curTab);}
 acc2+=100;if(acc2>=8000){acc2=0;save();}
},100);
function die(){
 S.deaths++;ach('die');
 const lost=Math.ceil(S.gold*0.12);
 S.gold=Math.floor(S.gold*0.88);
 hpNow=stats().hp;
 if(E){E.hp=E.max;E.t=0;}
 // track consecutive deaths at the same spot
 const here=S.region*100+S.stage;
 if(S.dieAt===here)S.dieStreak++;else{S.dieAt=here;S.dieStreak=1;}
 const stuck=S.dieStreak>=3&&S.maxRegion>0;
 deathOpen=true;
 const d=$('deathnotice');
 let body='<div class="dl">'+L(UI.deathGold).replace('{g}',fmt(lost))+'.<br>'+L(UI.deathHp)+'.<br><br>'+L(UI.deathRestart)+'</div>';
 if(stuck)body+='<div class="dl" style="color:var(--gold);border-top:1px solid var(--line);padding-top:12px;margin-top:4px">'+L(UI.deathStuck)+'</div>';
 d.innerHTML='<div class="skull">💀</div><div class="dt">'+L(UI.deathT)+'</div>'+body+
  (stuck?'<button class="bigbtn" style="max-width:240px" onclick="reviveDismiss();renderPanel(\'map\');">'+L(UI.deathStuckBtn)+'</button>':'')+
  '<button class="'+(stuck?'btn':'bigbtn')+'" style="max-width:240px;'+(stuck?'width:240px;margin-top:8px':'')+'" onclick="reviveDismiss()">'+L(UI.deathBtn)+'</button>';
 d.classList.add('show');
 renderTop();renderBattle();save();
}
function reviveDismiss(){deathOpen=false;$('deathnotice').classList.remove('show');}
/* ============ CHOICE MODALS ============ */
let modalOpen=false,selChoice=null,deathOpen=false;
function openModal(html){modalOpen=true;$('modal-box').innerHTML=html;$('modal-ov').classList.add('open');}
function closeModal(){modalOpen=false;$('modal-ov').classList.remove('open');selChoice=null;}
function maybeChoice(){
 if(S.level>=5&&!S.cls)return choiceModal('cls');
 if(S.level>=15&&S.cls&&!S.sub)return choiceModal('sub');
 if(S.level>=30&&S.sub&&!S.pact)return choiceModal('pact');
}
function choiceModal(kind){
 let list,title;
 if(kind==='cls'){list=Object.entries(CLASSES).map(([id,c])=>({id,...c}));title=L(UI.clsT);}
 else if(kind==='sub'){list=SUBS[S.cls];title=L(UI.subT);}
 else{list=PACTS;title=L(UI.pactT);}
 let h='<h2>'+title+'</h2><div class="sub">'+L(UI.chooseW)+'</div>';
 for(const c of list){
  h+='<div class="choice" data-id="'+c.id+'" onclick="pick(this)">'+
   '<div class="cn">'+c.e+' '+L(c.n)+' <span style="margin-left:auto;font-size:10px;color:var(--bone-dim)">'+L(UI.riskm)+' ×'+c.risk.toFixed(2)+'</span></div>'+
   '<div class="adv">✦ '+L(UI.adv)+': '+L(c.adv)+'</div>'+
   '<div class="cost">⊘ '+L(UI.cost)+': '+L(c.cost)+'</div></div>';}
 h+='<button class="bigbtn dis" id="choiceok" onclick="confirmChoice(\''+kind+'\')">'+L(UI.choose)+'</button>';
 openModal(h);
}
function pick(el){document.querySelectorAll('.choice').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');
 selChoice=el.dataset.id;$('choiceok').classList.remove('dis');}
function confirmChoice(kind){
 if(!selChoice)return;
 if(kind==='cls')S.cls=selChoice;else if(kind==='sub')S.sub=selChoice;else{S.pact=selChoice;ach('pact');}
 hpNow=stats().hp;
 closeModal();banner('🜏');sparks(10,'🜏');renderTop();renderBattle();if(curTab)renderPanel(curTab);save();
 setTimeout(maybeChoice,600);
}
/* ============ PUZZLES ============ */
let pz={};
function runeBanner(r){
 return '<div style="text-align:center;background:var(--panel);border:1px solid var(--arcane);border-radius:10px;padding:8px 10px;margin-bottom:10px">'+
  '<div style="font-size:13px;color:var(--arcane);font-weight:800">'+RUNE_E[r]+' '+L(RUNE_BONUS[r].n)+'</div>'+
  '<div style="font-size:11px;color:var(--gold);margin-top:2px">✦ '+L(UI.runeReward)+': '+L(RUNE_BONUS[r].d)+'</div></div>';
}
function openPuzzle(r){
 const P=PUZZLES[r];
 if(P.type==='memory')return memPuzzle(r);
 let h='<h2>'+RUNE_E[r]+' '+L(UI.pz)+'</h2>'+runeBanner(r)+'<div class="sub" style="font-size:13px;line-height:1.7">'+L(P.q)+'</div>'+
  '<input type="text" id="pzin" autocomplete="off">'+
  '<div class="pzmsg" id="pzmsg"></div>'+
  '<button class="bigbtn" onclick="checkText('+r+')">'+L(UI.pzsubmit)+'</button>'+
  '<button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">'+L(UI.close)+'</button>';
 openModal(h);
}
function checkText(r){
 const v=norm($('pzin').value);if(!v)return;
 if(PUZZLES[r].a.some(a=>v===a||v.includes(a)&&a.length>3)){runeWin(r);}
 else{S.pfails++;$('pzmsg').textContent=L(UI.pzwrong);$('pzmsg').className='pzmsg';
  const m=$('modal-box');m.classList.remove('shake');void m.offsetWidth;m.classList.add('shake');renderTop();save();}
}
function memPuzzle(r){
 pz={r,seq:Array.from({length:5},()=>Math.floor(Math.random()*4)),inp:[],lock:true};
 const E4=['🔥','💧','🌪️','🪨'];
 let h='<h2>'+RUNE_E[r]+' '+L(UI.pz)+'</h2>'+runeBanner(r)+'<div class="sub">'+L({tr:'Buz aynası bir sıra gösterecek. Aynısını tekrar et.',en:'The ice mirror will show a sequence. Repeat it exactly.'})+'</div>'+
  '<div style="display:flex;gap:10px;justify-content:center;margin:8px 0 4px">';
 E4.forEach((e,i)=>{h+='<button class="memcell" id="mc'+i+'" onclick="memTap('+i+')">'+e+'</button>';});
 h+='</div><div class="pzmsg" id="pzmsg"></div>'+
  '<button class="bigbtn" id="memwatch" onclick="memPlay()">▶ '+L(UI.pzwatch)+'</button>'+
  '<button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">'+L(UI.close)+'</button>';
 openModal(h);
}
function memPlay(){
 pz.lock=true;pz.inp=[];$('pzmsg').textContent='';$('memwatch').classList.add('dis');
 pz.seq.forEach((v,i)=>{setTimeout(()=>{const c=$('mc'+v);c.classList.add('lit');setTimeout(()=>c.classList.remove('lit'),420);},i*650+400);});
 setTimeout(()=>{pz.lock=false;$('pzmsg').textContent=L(UI.pzrepeat);$('pzmsg').className='pzmsg ok';$('memwatch').classList.remove('dis');},pz.seq.length*650+700);
}
function memTap(i){
 if(pz.lock)return;
 const c=$('mc'+i);c.classList.add('lit');setTimeout(()=>c.classList.remove('lit'),200);
 pz.inp.push(i);const k=pz.inp.length-1;
 if(pz.inp[k]!==pz.seq[k]){S.pfails++;pz.inp=[];$('pzmsg').textContent=L(UI.pzwrong);$('pzmsg').className='pzmsg';renderTop();save();return;}
 if(pz.inp.length===pz.seq.length)runeWin(pz.r);
}
function runeWin(r){
 if(!S.runes.includes(r))S.runes.push(r);
 ach('rune1');if(S.runes.length===7)ach('rune7');
 const st=stats();hpNow=Math.min(stats().hp,hpNow); // recalc cap (hp rune may raise max)
 closeModal();toast(RUNE_E[r]+' '+L(RUNE_BONUS[r].n)+' — '+L(RUNE_BONUS[r].d));sparks(12,'✨');renderTop();renderBattle();save();
}
/* ============ THE GATE ============ */
let gateExp=1;
function openGate(){
 gateExp=1;
 let h='<h2 style="color:var(--arcane)">'+L(UI.gate)+'</h2><div class="sub">'+L(UI.gated)+'</div><div style="text-align:center">';
 for(let r=0;r<7;r++){h+='<button class="runechip" id="rc'+r+'" onclick="gateTap('+r+')"><span>'+RUNE_E[r]+'</span><span class="num">'+RUNE_NUM[r]+'</span></button>';}
 h+='</div><div class="pzmsg" id="pzmsg"></div>'+
  '<button class="btn" style="width:100%;margin-top:10px" onclick="closeModal()">'+L(UI.close)+'</button>';
 openModal(h);closePanel();
}
function gateTap(r){
 if(RUNE_NUM[r]===gateExp){$('rc'+r).classList.add('done');gateExp++;
  if(gateExp>7){S.gate=true;shake();sparks(14,'🌑');
   const h='<h2 style="color:var(--arcane)">⛧ '+L(UI.gateRevealT)+'</h2>'+
    '<div class="sub" style="line-height:1.7">'+L(UI.gateRevealD)+'</div>'+
    '<div class="rowitem"><div style="font-size:30px">🌑</div><div class="grow"><div class="t1" style="color:var(--blood)">'+L(UI.truename)+'</div><div class="t2">'+L(UI.gateBossNote)+'</div></div></div>'+
    '<button class="bigbtn" onclick="closeModal();banner(\'⛧\');setTimeout(()=>spawn(true),400);">'+L(UI.gateFight)+'</button>';
   openModal(h);save();}
 }else{gateExp=1;S.pfails++;document.querySelectorAll('.runechip').forEach(c=>c.classList.remove('done'));
  $('pzmsg').textContent=L(UI.pzwrong);renderTop();save();}
}
function winScreen(){
 let h='<h2 style="font-size:24px">🌅 '+L(UI.truewin)+'</h2>'+
  '<div class="sub" style="font-size:13px;line-height:1.8;margin-top:10px">'+L(UI.truewind)+'</div>'+
  '<div class="statgrid" style="margin-top:12px"><div class="statbox"><div class="l">'+L(UI.scorel)+'</div><div class="v" style="color:var(--gold)">'+fmt(score())+'</div></div>'+
  '<div class="statbox"><div class="l">'+L(UI.riskm)+'</div><div class="v">×'+riskMult().toFixed(2)+'</div></div></div>'+
  '<button class="bigbtn" onclick="closeModal();spawn();">'+L(UI.cont)+'</button>';
 openModal(h);save();
}
function newEra(){
 // confirm first — this is a full prestige reset
 const cur=score();
 const h='<h2 style="color:var(--gold)">⏳ '+L(UI.newera)+' '+(S.era+1)+'</h2>'+
  '<div class="sub" style="line-height:1.7">'+L(UI.eraExplain)+'</div>'+
  '<div class="rowitem"><div class="grow"><div class="t1" style="color:var(--green)">✓ '+L(UI.eraKeep)+'</div><div class="t2">'+L(UI.eraKeepList)+'</div></div></div>'+
  '<div class="rowitem"><div class="grow"><div class="t1" style="color:#e2756a">✖ '+L(UI.eraLose)+'</div><div class="t2">'+L(UI.eraLoseList)+'</div></div></div>'+
  '<div class="rowitem"><div class="grow"><div class="t1" style="color:var(--gold)">✦ '+L(UI.eraGain)+'</div><div class="t2">'+L(UI.eraGainText).replace('{p}',(S.era+1)*50)+'</div></div></div>'+
  '<button class="bigbtn" onclick="doNewEra()">'+L(UI.eraConfirm)+'</button>'+
  '<button class="btn" style="width:100%;margin-top:8px" onclick="closeModal()">'+L(UI.close)+'</button>';
 openModal(h);
}
function doNewEra(){
 const keep={lang:S.lang,name:S.name,era:S.era+1,ach:S.ach,best:Math.max(S.best,score()),trueDown:false};
 S=Object.assign(fresh(),keep);S.started=true;ach('era');
 hpNow=stats().hp;
 closeModal();closePanel();banner('⏳ '+L(UI.newera)+' '+S.era);sparks(12,'⏳');
 spawn();renderAllies();renderTop();applyLang();save();
}
/* ============ INIT ============ */
function startGame(){
 const n=$('nameinput').value.trim();
 S.name=n||(S.lang==='tr'?'Seyyah':'Wanderer');
 S.started=true;hpNow=stats().hp;
 $('title-screen').classList.remove('open');
 spawn();renderAllies();renderTop();applyLang();save();
}
$('startbtn').addEventListener('click',startGame);
$('tlang').addEventListener('click',()=>{S.lang=S.lang==='tr'?'en':'tr';titleLang();});
$('langbtn').addEventListener('click',()=>{S.lang=S.lang==='tr'?'en':'tr';applyLang();save();});
function titleLang(){
 $('gamesub').innerHTML=L(UI.sub);
 $('nameinput').placeholder=L(UI.namePh);
 $('startbtn').textContent=S.started?L(UI.cont):L(UI.start);
}
$('panel').addEventListener('pointerdown',()=>{lastTap=Date.now();});
$('pausebtn').addEventListener('click',pauseGame);
function pauseGame(){
 if(modalOpen||deathOpen)return;
 const h='<h2>⏸ '+L(UI.paused)+'</h2><div class="sub">'+L(UI.pausedd)+'</div>'+
  '<button class="bigbtn" onclick="closeModal()">▶ '+L(UI.resume)+'</button>';
 openModal(h);
}
$('enemywrap').addEventListener('pointerdown',attack);
$('sigil').addEventListener('pointerdown',e=>{e.stopPropagation();if(S.reach[S.region]>=5&&!S.runes.includes(S.region))openPuzzle(S.region);});
document.querySelectorAll('#tabbar button').forEach(b=>b.addEventListener('click',()=>{
 if(curTab===b.dataset.tab)closePanel();else renderPanel(b.dataset.tab);}));
$('battle').addEventListener('pointerdown',e=>{if(e.target.id==='battle')closePanel();});
/* boot */
const has=load();
if(has){hpNow=stats().hp;$('title-screen').classList.remove('open');spawn();renderAllies();applyLang();maybeChoice();}
else{titleLang();}
renderTop();
</script>
